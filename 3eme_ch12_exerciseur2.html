<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atelier d'Homothétie</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
#root{display:flex;flex-direction:column}
body{font-family:'DM Sans',system-ui,sans-serif;background:#e8e4de}
:root{
  --hdr-bg:#0f172a;
  --hdr-h:54px;
  --sb-w:252px;
  --radius-lg:14px;
  --radius-md:10px;
  --radius-sm:7px;
  --sand-50:#faf8f5;
  --sand-100:#f2efe8;
  --sand-200:#e4dfd5;
  --sand-300:#cdc8bc;
  --sand-700:#6b6459;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-4px)}}
@keyframes pulseO{0%,100%{r:8}50%{r:11}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ═══ HEADER ════════════════════════════════════════════ */
.hdr{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:var(--hdr-h);
  background:var(--hdr-bg);
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;z-index:30;
  box-shadow:0 2px 20px rgba(0,0,0,.35);
}
.hdr-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.hdr-logo-pill{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 2px 8px rgba(99,102,241,.45);
  flex-shrink:0;
}
.hdr-title{font-size:14px;font-weight:700;color:#f8fafc;letter-spacing:-.2px;white-space:nowrap;line-height:1.2}
.hdr-title-sub{font-size:10px;font-weight:400;color:#64748b;display:block;letter-spacing:.2px}

.hdr-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;}
.hdr-right{display:flex;align-items:center;gap:3px;margin-left:auto;flex-shrink:0;}

/* Tool groups */
.tool-group{
  display:flex;align-items:center;gap:2px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:3px;
}

.tbtn{
  width:32px;height:32px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.55);transition:all .15s ease;
  position:relative;flex-shrink:0;
}
.tbtn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9);}
.tbtn.on{background:rgba(255,255,255,.95);color:#0f172a;box-shadow:0 1px 6px rgba(0,0,0,.25);}
.tbtn.accent{background:#3b82f6;color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.4);}
.tbtn-sm{width:28px;height:28px;font-size:13px;}
.tbtn-label{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.4);white-space:nowrap;padding:0 6px;letter-spacing:.3px;}

.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 4px;flex-shrink:0}

.zoom-display{
  font-size:10px;color:rgba(255,255,255,.45);
  min-width:36px;text-align:center;font-family:'DM Mono',monospace;
  font-weight:500;
}

/* ═══ MAIN ══════════════════════════════════════════════ */
.main{display:flex;flex:1;min-height:0;overflow:hidden}
.canvas-wrap{flex:1;min-width:0;position:relative;overflow:hidden;touch-action:none}

/* ═══ SIDEBAR ════════════════════════════════════════════ */
.sb{
  width:var(--sb-w);flex-shrink:0;display:flex;flex-direction:column;
  background:var(--sand-50);
  border-left:1px solid var(--sand-200);
  overflow-y:auto;overflow-x:hidden;z-index:20;
  box-shadow:-4px 0 20px rgba(0,0,0,.05);
}
.sb::-webkit-scrollbar{width:4px}
.sb::-webkit-scrollbar-track{background:transparent}
.sb::-webkit-scrollbar-thumb{background:var(--sand-300);border-radius:4px}

.sb-section{padding:16px;border-bottom:1px solid var(--sand-200);flex-shrink:0;}
.sb-section:last-child{border-bottom:none;flex:1;}
.sb-label{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.8px;color:var(--sand-300);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.sb-label::after{content:'';flex:1;height:1px;background:var(--sand-200);}

/* Level cards */
.lv-card{
  width:100%;padding:11px 13px;border-radius:var(--radius-md);
  border:1.5px solid var(--sand-200);background:#fff;
  cursor:pointer;font-family:'DM Sans',inherit;
  display:flex;align-items:center;gap:10px;
  margin-bottom:5px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  transition:all .18s ease;text-align:left;
  position:relative;overflow:hidden;
}
.lv-card:last-child{margin-bottom:0}
.lv-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;border-radius:0 2px 2px 0;
  background:var(--lv-col,#94a3b8);
  transition:width .18s ease;
}
.lv-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateX(2px);border-color:var(--lv-col,#94a3b8);}
.lv-card:hover::before{width:4px}
.lv-card.active{
  border-color:var(--lv-col);
  background:color-mix(in srgb,var(--lv-col) 6%,#fff);
  box-shadow:0 4px 16px color-mix(in srgb,var(--lv-col) 25%,transparent);
}
.lv-card.active::before{width:4px}
.lv-k{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-weight:700;font-size:22px;
  line-height:1;color:var(--lv-col);flex-shrink:0;min-width:40px;
  text-align:center;
}
.lv-info{flex:1;min-width:0;}
.lv-info strong{font-size:11.5px;font-weight:600;color:#1e1b16;display:block;line-height:1.3}
.lv-info span{font-size:10px;font-weight:400;color:var(--sand-700);display:block;margin-top:1px}
.lv-badge{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  background:var(--lv-col);color:#fff;flex-shrink:0;letter-spacing:.3px;
}

/* Instrument grid */
.instr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.instr-btn{
  padding:10px 8px;border-radius:var(--radius-md);
  border:1.5px solid var(--sand-200);background:#fff;
  cursor:pointer;font-family:'DM Sans',inherit;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .15s ease;
}
.instr-btn:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px);}
.instr-btn.on{border-color:var(--instr-col);background:color-mix(in srgb,var(--instr-col) 8%,#fff);box-shadow:0 2px 10px color-mix(in srgb,var(--instr-col) 20%,transparent);}
.instr-ico{font-size:20px;line-height:1;}
.instr-lbl{font-size:10px;font-weight:600;color:#4a4640;letter-spacing:.1px;}
.instr-dot{width:5px;height:5px;border-radius:50%;background:var(--sand-200);transition:background .15s;}
.instr-btn.on .instr-dot{background:var(--instr-col);}

/* Consigne card */
.ccard{
  background:#fff;border-radius:var(--radius-lg);padding:13px 14px;
  border:1.5px solid var(--sand-200);
  box-shadow:0 1px 6px rgba(0,0,0,.06);
  animation:slideUp .22s ease;margin-bottom:8px;
}
.ccard-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;padding:3px 9px;
  border-radius:20px;color:#fff;margin-bottom:8px;
  letter-spacing:.5px;text-transform:uppercase;
}
.ccard-formula{
  font-family:'Playfair Display',Georgia,serif;font-style:italic;
  font-size:15px;color:#1e1b16;margin-bottom:6px;display:block;
  letter-spacing:-.2px;
}
.ccard-text{font-size:11.5px;line-height:1.65;color:#4a4640;}

.vcard{border-radius:var(--radius-md);padding:10px 13px;font-size:11.5px;font-weight:600;
  line-height:1.45;animation:slideUp .18s ease;margin-bottom:8px}
.vok{background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7}
.verr{background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5}

/* Action buttons */
.abtn{
  width:100%;padding:11px 14px;border-radius:var(--radius-md);border:none;
  cursor:pointer;font-family:'DM Sans',inherit;font-size:12.5px;font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.14);transition:all .15s ease;
  margin-bottom:6px;letter-spacing:-.1px;
}
.abtn:last-child{margin-bottom:0}
.abtn:hover{box-shadow:0 4px 18px rgba(0,0,0,.2);transform:translateY(-1px)}
.abtn-ghost{
  width:100%;padding:10px 13px;border-radius:var(--radius-md);
  border:1.5px solid var(--sand-200);background:#fff;
  cursor:pointer;font-family:'DM Sans',inherit;
  font-size:12px;font-weight:600;color:var(--sand-700);margin-bottom:6px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .15s ease;
}
.abtn-ghost:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);border-color:var(--sand-300);}

/* Status bar */
.sbar{
  display:flex;align-items:center;gap:10px;padding:0 14px;height:22px;
  background:var(--hdr-bg);border-top:1px solid rgba(255,255,255,.05);
  font-size:9px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;
  flex-shrink:0;overflow:hidden;
}
.sbar-chip{
  padding:1px 6px;border-radius:4px;background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.5);font-weight:500;font-size:9px;
}

/* Mobile toggle */
.sb-toggle{
  display:none;position:fixed;bottom:16px;right:16px;z-index:100;
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--hdr-bg);color:#fff;font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  align-items:center;justify-content:center;
}
.sb{touch-action:pan-y}
@media(max-width:768px){
  .hdr{height:46px;padding:0 8px;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;flex-wrap:nowrap;gap:4px}
  .hdr::-webkit-scrollbar{display:none}
  .hdr-title-sub{display:none}
  .hdr-mid{flex:none;gap:2px;}
  .tool-group{padding:2px;}
  .tbtn{width:28px;height:28px;font-size:13px;flex-shrink:0;}
  .tbtn-sm{width:26px;height:26px;}
  .main{flex-direction:column}
  .sb-toggle{display:flex}
  .sb{position:fixed;bottom:0;left:0;right:0;z-index:80;
    width:100%;max-height:65vh;overflow-y:auto;border-left:none;
    border-top:2px solid var(--sand-200);border-radius:20px 20px 0 0;
    box-shadow:0 -6px 28px rgba(0,0,0,.2);
    transform:translateY(100%);transition:transform .3s ease}
  .sb.open{transform:translateY(0)}
  .sb-section{padding:12px 14px;}
  .ccard{font-size:10.5px;padding:10px 12px;margin-bottom:5px}
  .vcard{font-size:10px;padding:8px 10px;margin-bottom:5px}
  .abtn,.abtn-ghost{padding:10px 13px;font-size:12px;margin-bottom:5px}
  .lv-badge{display:none}
  .sbar{display:none}
  .hdr-sep{display:none}
  .tbtn-label{display:none}
}
@media(min-width:769px){.sb-toggle{display:none!important}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

// ═══ FONCTIONS UTILITAIRES MANQUANTES (correctif) ══════════════════
const D2R=deg=>deg*Math.PI/180;
const R2D=rad=>rad*180/Math.PI;

// ═══ CONSTANTES ═══════════════════════════════════════════════════
const IZ=3,RH=18,PROT_R=90,RAIL_PX=10,DETACH_PX=15,ANG_TOL=15;
const CRAN_PX=11,PT_PX=14,VTXSNAP_PX=14,ANCHOR_PX=30;
const MERGE_MM=1.2,MERGE_ANG=5,HDL_R=10,VALID_TOL_PX=12;
const ORAIL_PX=8, DETACH_ORAIL=52;
const TOUCH_HDL=35;
// ── Tailles FIXES en pixels écran (indépendantes du zoom) ──────────
const PX_PT_EX=5;
const PX_PT_O=6;
const PX_PT_STU=5;
const PX_PT_SOL=5;

const LVCONF={
  1:{n:1,conn:[],                  k:2,   col:'#7c3aed',label:"k = 2 — Un point A"},
  2:{n:2,conn:[[0,1]],             k:0.5, col:'#1d4ed8',label:"k = ½ — Segment [AB]"},
  3:{n:3,conn:[[0,1],[1,2],[2,0]], k:-1,  col:'#059669',label:"k = −1 — Triangle"},
  4:{n:2,conn:[[0,1]],             k:-2,  col:'#d97706',label:"k = −2 — Symétrie + ×2"},
  5:{n:3,conn:[[0,1],[1,2]],       k:1.5, col:'#dc2626',label:"k = 3/2 — Brisée élargie"},
};
function kLabel(k){
  if(k===Math.floor(k))return String(k);
  return k.toFixed(1).replace('.',',');
}
const CONSIGNE={
  1:`Construis l'image du point A par l'homothétie de centre O et de rapport k = 2.`,
  2:`Construis l'image du segment [AB] par l'homothétie de centre O et de rapport k = 0,5.`,
  3:`Construis l'image du triangle ABC par l'homothétie de centre O et de rapport k = −1.`,
  4:`Construis l'image du segment [AB] par l'homothétie de centre O et de rapport k = −2.`,
  5:`Construis l'image de la brisée ABC par l'homothétie de centre O et de rapport k = 1,5.`,
  libre:"Mode libre — explore l'homothétie avec les instruments.",
};

const V=(x,y)=>({x,y});
const vadd=(a,b)=>V(a.x+b.x,a.y+b.y);
const vsub=(a,b)=>V(a.x-b.x,a.y-b.y);
const vscl=(v,s)=>V(v.x*s,v.y*s);
const vdot=(a,b)=>a.x*b.x+a.y*b.y;
const vlen=v=>Math.sqrt(v.x*v.x+v.y*v.y);
const vunit=v=>{const l=vlen(v);return l<1e-10?V(1,0):V(v.x/l,v.y/l)};
const vperp=v=>V(-v.y,v.x);
const vdst=(a,b)=>vlen(vsub(a,b));
const angDiff=(a,b)=>{let d=Math.abs(((a-b)%360+360)%360);return d>180?360-d:d};
const projRay=(p,pt,dir)=>vadd(pt,vscl(dir,vdot(vsub(p,pt),dir)));
const dRay=(p,pt,dir)=>vdst(p,projRay(p,pt,dir));
const tRay=(p,pt,dir)=>vdot(vsub(p,pt),dir);
const noFlipDir=(candidate,current)=>vdot(candidate,current)>=0?candidate:vscl(candidate,-1);

function rayRay(p1,d1,p2,d2){
  const cr=d1.x*d2.y-d1.y*d2.x;
  if(Math.abs(cr)<1e-9)return null;
  return vadd(p1,vscl(d1,((p2.x-p1.x)*d2.y-(p2.y-p1.y)*d2.x)/cr));
}
function linCirc(p1,p2,cx,cy,r){
  const dx=p2.x-p1.x,dy=p2.y-p1.y,fx=p1.x-cx,fy=p1.y-cy,A=dx*dx+dy*dy;
  if(A<1e-10)return[];
  const B=2*(fx*dx+fy*dy),C=fx*fx+fy*fy-r*r,disc=B*B-4*A*C;
  if(disc<0)return[];
  const s=Math.sqrt(Math.max(0,disc));
  return[(-B-s)/(2*A),(-B+s)/(2*A)].map(t=>V(p1.x+t*dx,p1.y+t*dy));
}
function circCirc(x1,y1,r1,x2,y2,r2){
  const d=vdst(V(x1,y1),V(x2,y2));
  if(d<1e-9||d>r1+r2+.01||d<Math.abs(r1-r2)-.01)return[];
  const a=(r1*r1-r2*r2+d*d)/(2*d),h2=r1*r1-a*a;
  if(h2<0)return[];
  const h=Math.sqrt(Math.max(0,h2)),mx=x1+a*(x2-x1)/d,my=y1+a*(y2-y1)/d;
  if(h<1e-6)return[V(mx,my)];
  const px=h*(y2-y1)/d,py=h*(x2-x1)/d;
  return[V(mx+px,my-py),V(mx-px,my+py)];
}
function arcStr(cx,cy,r,a1,a2){
  let sw=((a2-a1)%360+360)%360;
  if(sw<.05)return'';
  if(sw>=359.95)return`M${cx-r} ${cy} A${r} ${r} 0 1 1 ${cx+r} ${cy} A${r} ${r} 0 1 1 ${cx-r} ${cy}`;
  const R1=D2R(a1),R2=D2R(a1+sw);
  return`M${cx+r*Math.cos(R1)} ${cy+r*Math.sin(R1)} A${r} ${r} 0 ${sw>180?1:0} 1 ${cx+r*Math.cos(R2)} ${cy+r*Math.sin(R2)}`;
}

// ═══ INSTRUMENTS ══════════════════════════════════════════════════
function rulerG(r){
  const a=D2R(r.angle),dir=V(Math.cos(a),Math.sin(a)),nor=V(dir.y,-dir.x),h=RH/2;
  const O=V(r.x,r.y),E=vadd(O,vscl(dir,r.length));
  const cL=vadd(O,vscl(nor,h)),cR=vadd(E,vscl(nor,h));
  return{O,E,dir,nor,h,cL,cR,top:[cL,cR],bot:[vadd(O,vscl(nor,-h)),vadd(E,vscl(nor,-h))],corners:[cL,cR,vadd(E,vscl(nor,-h)),vadd(O,vscl(nor,-h))],...r};
}
function squareG(s){
  const a=D2R(s.angle),U=V(Math.cos(a),Math.sin(a)),W=vperp(U);
  const O=V(s.x,s.y),A=vadd(O,vscl(U,s.size)),B=vadd(O,vscl(W,s.size));
  return{O,A,B,U,W,leg1:[O,A],leg2:[O,B],hyp:[A,B],...s};
}

// ═══ POOL MAGNÉTIQUE ══════════════════════════════════════════════
function buildPool(segs,arcs,named,cmpPt,protPt){
  const p=[];
  named.forEach(n=>p.push({x:n.x,y:n.y,kind:'named'}));
  segs.forEach(s=>{if(!s.isExSeg){p.push({x:s.x1,y:s.y1,kind:'end'});p.push({x:s.x2,y:s.y2,kind:'end'});}});
  arcs.forEach(a=>p.push({x:a.cx,y:a.cy,kind:'center'}));
  for(let i=0;i<segs.length;i++)for(let j=i+1;j<segs.length;j++){
    const r=rayRay(V(segs[i].x1,segs[i].y1),vunit(vsub(V(segs[i].x2,segs[i].y2),V(segs[i].x1,segs[i].y1))),V(segs[j].x1,segs[j].y1),vunit(vsub(V(segs[j].x2,segs[j].y2),V(segs[j].x1,segs[j].y1))));
    if(r)p.push({x:r.x,y:r.y,kind:'inter'});
  }
  segs.forEach(s=>arcs.forEach(a=>{linCirc(V(s.x1,s.y1),V(s.x2,s.y2),a.cx,a.cy,a.r).forEach(r=>p.push({x:r.x,y:r.y,kind:'inter'}));}));
  for(let i=0;i<arcs.length;i++)for(let j=i+1;j<arcs.length;j++)
    circCirc(arcs[i].cx,arcs[i].cy,arcs[i].r,arcs[j].cx,arcs[j].cy,arcs[j].r).forEach(r=>p.push({x:r.x,y:r.y,kind:'inter'}));
  if(cmpPt)p.push({x:cmpPt.x,y:cmpPt.y,kind:'center'});
  if(protPt)p.push({x:protPt.x,y:protPt.y,kind:'center'});
  return p;
}
function nearestPt(pt,pool,radius){
  let best=null,bd=radius;
  for(const c of pool){const d=vdst(pt,V(c.x,c.y));if(d<bd){bd=d;best=c;}}
  return best;
}
function snapToEdge(pt,rG,sG,mm,snapMM){
  let best=null,bd=mm;
  const chk=e=>{const dir=vunit(vsub(e[1],e[0])),proj=projRay(pt,e[0],dir),d=vdst(pt,proj);if(d<bd){bd=d;const d0=vdst(pt,e[0]),d1=vdst(pt,e[1]),ep=(d0<snapMM)?e[0]:(d1<snapMM)?e[1]:null;best={pt:ep||proj,edge:e,endpt:ep};}};
  if(rG){chk(rG.top);chk(rG.bot);}
  if(sG){chk(sG.leg1);chk(sG.leg2);}
  return best;
}
function tryMerge(ns,segs,tol,aTol){
  const A=V(ns.x1,ns.y1),B=V(ns.x2,ns.y2),ang=R2D(Math.atan2(B.y-A.y,B.x-A.x));
  for(const s of segs){
    if(s.locked)continue;
    const sa=R2D(Math.atan2(s.y2-s.y1,s.x2-s.x1));
    if(Math.min(angDiff(ang,sa),angDiff(ang+180,sa))>aTol)continue;
    if(vdst(A,V(s.x2,s.y2))<tol)return{id:s.id,seg:{...s,x2:B.x,y2:B.y}};
    if(vdst(A,V(s.x1,s.y1))<tol)return{id:s.id,seg:{...s,x1:B.x,y1:B.y}};
    if(vdst(B,V(s.x1,s.y1))<tol)return{id:s.id,seg:{...s,x1:A.x,y1:A.y}};
    if(vdst(B,V(s.x2,s.y2))<tol)return{id:s.id,seg:{...s,x2:A.x,y2:A.y}};
  }
  return null;
}

// ═══ RAILS SEGMENTS ═══════════════════════════════════════════════
function segsToRails(segs){
  return segs.filter(s=>!s.isExSeg).map(s=>{
    const dir=vunit(vsub(V(s.x2,s.y2),V(s.x1,s.y1)));
    return{pt:V(s.x1,s.y1),dir,segId:s.id,segAng:R2D(Math.atan2(dir.y,dir.x))};
  });
}
function closestAngle(cur,cands){return cands.reduce((b,c)=>{const d=angDiff(cur,c);return d<b.da?{a:(c+360)%360,da:d}:b},{a:(cands[0]+360)%360,da:angDiff(cur,cands[0])});}

function tryRailSnap(instr,segs,zoom,isSq,oPts){
  const mm=RAIL_PX/zoom;
  const rails=segsToRails(segs);
  let best=null,bestScore=Infinity;

  for(const rail of rails){
    if(isSq){
      const g=squareG(instr),ia=instr.angle;
      const l1=closestAngle(ia,[rail.segAng,rail.segAng+180]);
      if(l1.da<ANG_TOL){const d=Math.min(dRay(g.O,rail.pt,rail.dir),dRay(g.A,rail.pt,rail.dir));if(d<mm&&d<bestScore){bestScore=d;best={rail,lockedAngle:l1.a,leg:'leg1'};}}
      const l2=closestAngle(ia,[rail.segAng-90,rail.segAng+90]);
      if(l2.da<ANG_TOL){const d=Math.min(dRay(g.O,rail.pt,rail.dir),dRay(g.B,rail.pt,rail.dir));if(d<mm&&d<bestScore){bestScore=d;best={rail,lockedAngle:l2.a,leg:'leg2'};}}
    }else{
      const g=rulerG(instr),lc=closestAngle(instr.angle,[rail.segAng,rail.segAng+180]);
      if(lc.da>ANG_TOL)continue;
      const dT=Math.min(dRay(g.top[0],rail.pt,rail.dir),dRay(g.top[1],rail.pt,rail.dir));
      const dB=Math.min(dRay(g.bot[0],rail.pt,rail.dir),dRay(g.bot[1],rail.pt,rail.dir));
      const d=Math.min(dT,dB);
      if(d<mm&&d<bestScore){bestScore=d;best={rail,lockedAngle:lc.a,edge:dT<dB?'top':'bot'};}
    }
  }

  if(!isSq&&oPts&&oPts.length>0){
    const g=rulerG(instr);
    const omm=(ORAIL_PX)/zoom;
    for(const O of oPts){
      const Opt=V(O.x,O.y);
      const dT=dRay(Opt,g.cL,g.dir);
      const dB=dRay(Opt,g.bot[0],g.dir);
      const d=Math.min(dT,dB);
      if(d<omm&&d<bestScore){
        bestScore=d;
        best={
          rail:{pt:Opt,dir:g.dir,segId:'O-rail'},
          lockedAngle:instr.angle,
          edge:dT<=dB?'top':'bot',
          isORail:true
        };
      }
    }
  }
  return best;
}

function railPos(lock,t,isSq){
  const pt=vadd(lock.rail.pt,vscl(lock.rail.dir,t));
  if(isSq)return{x:pt.x,y:pt.y,angle:lock.lockedAngle};
  const rd=lock.rail.dir,nor=V(rd.y,-rd.x),h=lock.edge==='top'?RH/2:-RH/2;
  return{x:pt.x-nor.x*h,y:pt.y-nor.y*h,angle:lock.lockedAngle};
}
function calcTOff(cur,lock,instr,isSq){
  const rd=lock.rail.dir,nor=isSq?vperp(rd):V(rd.y,-rd.x);
  const ref=isSq?V(instr.x,instr.y):vadd(V(instr.x,instr.y),vscl(nor,lock.edge==='top'?RH/2:-RH/2));
  return tRay(ref,lock.rail.pt,lock.rail.dir)-tRay(cur,lock.rail.pt,lock.rail.dir);
}
function findCran(t,rail,pool,mm){
  let best=null,bd=mm;
  for(const p of pool){const tp=tRay(V(p.x,p.y),rail.pt,rail.dir),d=Math.abs(tp-t);if(d<bd){bd=d;best={t:tp,pt:V(p.x,p.y),kind:p.kind};}}
  return best;
}
function vtxSnap(instr,pool,zoom,isSq){
  const r=VTXSNAP_PX/zoom;
  if(isSq){
    const g=squareG(instr);
    for(const{pt,label} of [{pt:g.O,label:'O'},{pt:g.A,label:'A'},{pt:g.B,label:'B'}]){
      const n=nearestPt(pt,pool,r);
      if(n)return{newState:{...instr,x:instr.x+(n.x-pt.x),y:instr.y+(n.y-pt.y)},snapPt:V(n.x,n.y),snapKind:n.kind,cornerLabel:label};
    }
  }else{
    const g=rulerG(instr);
    for(const{pt,label} of [{pt:g.cL,label:'cL'},{pt:g.cR,label:'cR'}]){
      const n=nearestPt(pt,pool,r);
      if(n)return{newState:{...instr,x:instr.x+(n.x-pt.x),y:instr.y+(n.y-pt.y)},snapPt:V(n.x,n.y),snapKind:n.kind,cornerLabel:label};
    }
  }
  return null;
}
function rulerAnchorSnap(rs,pool,mm){
  const g=rulerG(rs);
  for(const{pt,label} of [{pt:g.cL,label:'RULER_START'},{pt:g.cR,label:'RULER_END'}]){
    const n=nearestPt(pt,pool,mm);if(n)return{dx:n.x-pt.x,dy:n.y-pt.y,anchorLabel:label,snapPt:V(n.x,n.y),snapKind:n.kind};
  }
  return null;
}
function vcenter(panR,zoomR,cvaR){
  const vx=-panR.current.x/zoomR.current,vy=-panR.current.y/zoomR.current,a=-D2R(cvaR.current);
  return V(vx*Math.cos(a)-vy*Math.sin(a),vx*Math.sin(a)+vy*Math.cos(a));
}

// ═══ FIT TRANSFORM ════════════════════════════════════════════════
function fitTransform(ch,W,H){
  const pts=[...(ch.points||[]),...(ch.symmetrics||[])];
  if(ch.center)pts.push(ch.center);
  if(!pts.length)return{zoom:IZ,pan:{x:0,y:0}};
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  pts.forEach(p=>{x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y);});
  const pad=14;
  const fw=Math.max(x1-x0+pad*2,18),fh=Math.max(y1-y0+pad*2,18);
  const z=Math.max(IZ*.6,Math.min(Math.min(W,H)*.75/Math.max(fw,fh),IZ*6));
  return{zoom:z,pan:{x:-(x0+x1)/2*z,y:-(y0+y1)/2*z}};
}

// ═══ GÉNÉRATION DÉFI ══════════════════════════════════════════════
let _uid=0;const uid=()=>++_uid;

function generateChallenge(level,svgW,svgH){
  const conf=LVCONF[level];
  const k=conf.k;
  const absk=Math.abs(k);

  const Ox=(Math.random()-.5)*6;
  const Oy=(Math.random()-.5)*5;
  const center={x:Ox,y:Oy,label:'O'};

  const LABELS=['A','B','C','D','E'];
  const pts=[],imgs=[];

  const maxBound=absk>0?Math.min(40,32)/Math.max(1,absk):30;
  const minDist=Math.max(10,maxBound*.45);
  const maxDist=Math.max(minDist+4,maxBound*.90);
  const minSep=Math.max(10,Math.min(18,maxDist*.40));
  let gen=0;

  while(pts.length<conf.n&&gen<3000){
    gen++;
    const r=minDist+Math.random()*(maxDist-minDist);
    const angle=Math.random()*2*Math.PI;
    const P=V(Ox+r*Math.cos(angle),Oy+r*Math.sin(angle));
    const Pimg=V(Ox+k*(P.x-Ox),Oy+k*(P.y-Oy));
    if(Math.abs(P.x)>78||Math.abs(P.y)>58)continue;
    if(Math.abs(Pimg.x)>78||Math.abs(Pimg.y)>58)continue;
    let ok=true;
    for(const ep of [...pts,...imgs])
      if(vdst(P,ep)<minSep||vdst(Pimg,ep)<minSep||vdst(P,Pimg)<6){ok=false;break;}
    if(!ok)continue;
    pts.push({x:P.x,y:P.y,label:LABELS[pts.length]});
    imgs.push({x:Pimg.x,y:Pimg.y,label:LABELS[imgs.length]+"'"});
  }
  for(let i=pts.length;i<conf.n;i++){
    const angle=(i/conf.n)*2*Math.PI;
    const r=(minDist+maxDist)/2;
    const P=V(Ox+r*Math.cos(angle),Oy+r*Math.sin(angle));
    const Pimg=V(Ox+k*(P.x-Ox),Oy+k*(P.y-Oy));
    pts.push({x:P.x,y:P.y,label:LABELS[i]});
    imgs.push({x:Pimg.x,y:Pimg.y,label:LABELS[i]+"'"});
  }
  const exSegs=conf.conn.map(([i,j])=>({id:uid(),
    x1:pts[i].x,y1:pts[i].y,x2:pts[j].x,y2:pts[j].y,
    locked:true,isExSeg:true,style:'exseg'}));
  return{level,center,points:pts,symmetrics:imgs,exSegs,
    conn:conf.conn,k,solved:false,showSolution:false};
}

// ═══ RAPPORTEUR ═══════════════════════════════════════════════════
function ProtractorSVG({prot,zoom,isPen,onBodyDown,onRotDown,snapped}){
  const{cx,cy,baseAngle}=prot,R=PROT_R;
  const ba=D2R(baseAngle),cosB=Math.cos(ba),sinB=Math.sin(ba);
  const rx=(x,y)=>({x:cx+x*cosB-y*sinB,y:cy+x*sinB+y*cosB});
  const flatL=rx(-R,0),flatR=rx(R,0);
  const arcPath=`M ${flatL.x} ${flatL.y} A ${R} ${R} 0 0 1 ${flatR.x} ${flatR.y} Z`;
  const SEP=R*.72,RON=R*.80,RIN=SEP*.67;
  const els=[];
  for(let deg=0;deg<=180;deg++){
    const maj=deg%10===0,med=!maj&&deg%5===0;
    const rad=D2R(deg),c=Math.cos(rad),s=Math.sin(rad),tr=baseAngle+90-deg;
    const ro=maj?R*.90:med?R*.93:R*.95;
    const tO=rx(c*R,-s*R),tI=rx(c*ro,-s*ro);
    els.push(<line key={`te${deg}`} x1={tO.x} y1={tO.y} x2={tI.x} y2={tI.y} stroke="#0f172a" strokeWidth={(maj?2.8:med?1.6:.8)/zoom} style={{pointerEvents:'none'}}/>);
    if(maj){const lp=rx(c*RON,-s*RON);els.push(<text key={`le${deg}`} x={lp.x} y={lp.y} fontSize={16/zoom} fill="#0f172a" fontWeight="700" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${tr} ${lp.x} ${lp.y})`} style={{pointerEvents:'none',fontFamily:'Arial,sans-serif'}}>{deg}</text>);}
    if(deg>0&&deg<180){const ri=maj?SEP*.85:med?SEP*.90:SEP*.93;const tiO=rx(c*SEP,-s*SEP),tiI=rx(c*ri,-s*ri);els.push(<line key={`ti${deg}`} x1={tiO.x} y1={tiO.y} x2={tiI.x} y2={tiI.y} stroke="#334155" strokeWidth={(maj?2.2:med?1.2:.6)/zoom} style={{pointerEvents:'none'}}/>);}
    if(maj&&deg>0&&deg<180){const lp=rx(c*RIN,-s*RIN);els.push(<text key={`li${deg}`} x={lp.x} y={lp.y} fontSize={12/zoom} fill="#334155" fontWeight="600" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${tr} ${lp.x} ${lp.y})`} style={{pointerEvents:'none',fontFamily:'Arial,sans-serif'}}>{180-deg}</text>);}
  }
  const fR=rx(RON,0),fL=rx(-RON,0);
  els.push(<text key="ext0" x={fR.x} y={fR.y} fontSize={15/zoom} fill="#0f172a" fontWeight="800" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${baseAngle+90} ${fR.x} ${fR.y})`} style={{pointerEvents:'none',fontFamily:'Arial,sans-serif'}}>0</text>);
  els.push(<text key="ext180" x={fL.x} y={fL.y} fontSize={15/zoom} fill="#0f172a" fontWeight="800" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${baseAngle-90} ${fL.x} ${fL.y})`} style={{pointerEvents:'none',fontFamily:'Arial,sans-serif'}}>180</text>);
  const sepL=rx(-SEP,0),sepR=rx(SEP,0);
  const rotHdl=rx(0,-R),hR=HDL_R/zoom;
  return<g data-i="1">
    <path d={arcPath} fill="rgba(219,234,254,.12)" stroke="#3b82f6" strokeWidth={2/zoom} onMouseDown={isPen?undefined:onBodyDown} onTouchStart={isPen?undefined:e=>{e.preventDefault();onBodyDown(e.touches[0]||e.changedTouches[0]);}} style={{cursor:isPen?'default':'move'}}/>
    <line x1={flatL.x} y1={flatL.y} x2={flatR.x} y2={flatR.y} stroke="#0f172a" strokeWidth={2.5/zoom} style={{pointerEvents:'none'}}/>
    <path d={`M ${sepL.x} ${sepL.y} A ${SEP} ${SEP} 0 0 1 ${sepR.x} ${sepR.y}`} fill="none" stroke="#64748b" strokeWidth={1.2/zoom} style={{pointerEvents:'none'}}/>
    {(()=>{const t=rx(0,-SEP*.9);return<line x1={cx} y1={cy} x2={t.x} y2={t.y} stroke="#93c5fd" strokeWidth={1/zoom} strokeDasharray={`${4/zoom},${2/zoom}`} style={{pointerEvents:'none'}}/>;})()}
    {els}
    <line x1={cx-10/zoom} y1={cy} x2={cx+10/zoom} y2={cy} stroke="#0f172a" strokeWidth={2/zoom} style={{pointerEvents:'none'}}/>
    <line x1={cx} y1={cy-10/zoom} x2={cx} y2={cy+10/zoom} stroke="#0f172a" strokeWidth={2/zoom} style={{pointerEvents:'none'}}/>
    <circle cx={cx} cy={cy} r={5/zoom} fill="white" stroke="#0f172a" strokeWidth={2/zoom} style={{pointerEvents:'none'}}/>
    <circle cx={cx} cy={cy} r={1.8/zoom} fill="#0f172a" style={{pointerEvents:'none'}}/>
    {snapped&&<circle cx={cx} cy={cy} r={12/zoom} fill="none" stroke="#f59e0b" strokeWidth={3/zoom} style={{pointerEvents:'none'}}/>}
    {!isPen&&<g data-i="1"><circle cx={rotHdl.x} cy={rotHdl.y} r={hR} fill="#1d4ed8" stroke="white" strokeWidth={Math.max(.5,2/zoom)} onMouseDown={onRotDown} onTouchStart={e=>{e.preventDefault();onRotDown(e.touches[0]||e.changedTouches[0]);}} style={{cursor:'grab'}}/><text x={rotHdl.x} y={rotHdl.y} fontSize={hR*1.1} fill="white" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${baseAngle} ${rotHdl.x} ${rotHdl.y})`} style={{pointerEvents:'none'}}>↻</text></g>}
  </g>;
}

  function cursorSnap(raw,lockEdge=null){

  const toME=e=>({clientX:e.touches[0]?.clientX??e.changedTouches[0]?.clientX,clientY:e.touches[0]?.clientY??e.changedTouches[0]?.clientY,button:0,target:e.target,stopPropagation:()=>e.stopPropagation(),preventDefault:()=>e.preventDefault()});

  function onDown(e){

    const raw=s2c(e.clientX,e.clientY);

    if(tool==='rotate'){dragRef.current={t:'rot',sx:e.clientX,sa:cvaR.current};return;}
    if(tool==='point'){
      let finalPt=null;
      if(showRR.current){
        const rGn=rulerG(rulerR.current);
        const edgeMM=12/zR.current;
        const projT=projRay(raw,rGn.cL,rGn.dir);
        const projB=projRay(raw,rGn.bot[0],rGn.dir);
        const dT=vdst(raw,projT), dB=vdst(raw,projB);

          const t=tRay(best,rGn.cL,rGn.dir);
          if(t>=-0.5&&t<=rGn.length+0.5){

  }

    if(tool==='point'&&showRR.current){

  function onWheel(e){e.preventDefault();setZoom(z=>Math.max(.1,Math.min(30,z*(e.deltaY>0?.92:1.09))));}

  function instrDrag(e,type,get,set,isSq,lockRef,setSnap){
    if(penMode)return;e.stopPropagation();e.preventDefault();
    const origC=s2c(e.clientX,e.clientY),init=get();
    let lock=lockRef.current;
    const oCenters=getOCenters();

    if(type==='startR'||type==='endR'){

    }

    if(type==='move'&&!lock&&(segsR.current.length>0||oCenters.length>0)){
      const snap=tryRailSnap(init,segsR.current,zR.current,isSq,oCenters);
      if(snap){const tOff=calcTOff(origC,snap,init,isSq);lock={...snap,t_offset:tOff};lockRef.current=lock;setSnap(lock);}
    }
    function mv(me){
      const cur=s2c(me.clientX,me.clientY);
      if(type==='move'){
        const dx=cur.x-origC.x,dy=cur.y-origC.y,raw={...init,x:init.x+dx,y:init.y+dy};
        if(!isSq){

            if(pullDist>DETACH_ORAIL*1.4){
              lock=null;lockRef.current=null;setSnap(null);setCranInfo(null);setVtxInfo(null);

            }

            const h=lock.edge==='top'?RH/2:-RH/2;

              snapX=aP.x-nor.x*h;snapY=aP.y-nor.y*h;
            }else{
              const rLen=lock.rLen||init.length;

            }

          }

          const as=rulerAnchorSnap(raw,pool,aM);
          if(as){
            const anchored={...raw,x:raw.x+as.dx,y:raw.y+as.dy};

            let oFired=false;
            for(const Oc of oCenters){
              const Opt=V(Oc.x,Oc.y);
              const anchorPt=as.anchorLabel==='RULER_START'?ga.cL:ga.cR;
              if(vdst(anchorPt,Opt)<1)continue;
              const dT=dRay(Opt,ga.cL,ga.dir);
              const dB=dRay(Opt,ga.bot[0],ga.dir);
              const d=Math.min(dT,dB);
              if(d<omm2){
                const rawSnapDir=as.anchorLabel==='RULER_START'
                  ?vunit(vsub(Opt,anchorPt))
                  :vunit(vsub(anchorPt,Opt));
                const currentDir=V(Math.cos(D2R(raw.angle)),Math.sin(D2R(raw.angle)));
                const snapDir=noFlipDir(rawSnapDir,currentDir);

                const snapAngle=R2D(Math.atan2(snapDir.y,snapDir.x));
                const snapLen=Math.max(20,vdst(anchorPt,Opt)*1.6,ga.length);

        if(vdst(tgt,cLf)<2)return;
        const ndE=vunit(vsub(tgt,cLf));
        const newNorE=V(ndE.y,-ndE.x);
          const omm=ORAIL_PX/zR.current;

              const snapAngle=R2D(Math.atan2(snapDir.y,snapDir.x));
              const snapLen=Math.max(15,vdst(tgt,cLf));
              const snapX=cLf.x-snapNor.x*RH/2;
              const snapY=cLf.y-snapNor.y*RH/2;

      }

            const snapNor=V(snapDir.y,-snapDir.x);
            const snapAngle=R2D(Math.atan2(snapDir.y,snapDir.x));
            const snapLen=Math.max(15,vdst(tgt,cRf));
            const newCL=vsub(tgt,vscl(snapNor,RH/2));

          }

        set(s=>({...s,x:vsub(tgt,vscl(newNorS,RH/2)).x,y:vsub(tgt,vscl(newNorS,RH/2)).y,length:Math.max(15,vdst(tgt,cRf)),angle:R2D(Math.atan2(ndS.y,ndS.x))}));return;
      }
      if(type==='vtxO'){
        const ne=nearestPt(cur,getPool(),ptMM());const tgt=ne?V(ne.x,ne.y):cur;
        if(ne)setSnapD({pt:tgt,kind:ne.kind});else setSnapD(null);

        return;
      }
      if(type==='vtxA'){const O=V(init.x,init.y);const ne=nearestPt(cur,getPool(),ptMM());const tgt=ne?V(ne.x,ne.y):cur;if(ne)setSnapD({pt:tgt,kind:ne.kind});else setSnapD(null);set(s=>({...s,size:Math.max(15,vdst(tgt,O)),angle:R2D(Math.atan2(tgt.y-O.y,tgt.x-O.x))}));if(ne)setVtxInfo({snapPt:tgt,cornerLabel:'A',kind:ne.kind});else setVtxInfo(null);return;}

      if(type==='cmpR'){const a=R2D(Math.atan2(cur.y-init.cy,cur.x-init.cx));const r=Math.max(4,vdst(cur,V(init.cx,init.cy)));const ne=nearestPt(V(init.cx+r*Math.cos(D2R(a)),init.cy+r*Math.sin(D2R(a))),getPool(false,false),ptMM());if(ne){set(s=>({...s,radius:vdst(V(ne.x,ne.y),V(init.cx,init.cy)),pencilAngle:R2D(Math.atan2(ne.y-init.cy,ne.x-init.cx))}));setSnapD({pt:V(ne.x,ne.y),kind:ne.kind});}else{set(s=>({...s,radius:r,pencilAngle:a}));setSnapD(null);}return;}
    }

                    fill={sn?'#dbeafe':'#eff6ff'} stroke={sc} strokeWidth={sn?2.2:1.4}
                    onMouseDown={penMode?undefined:e=>instrDrag(e,'move',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                    onTouchStart={penMode?undefined:e=>{e.preventDefault();instrDrag(toME(e),'move',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                    style={{cursor:penMode?'default':'move'}}/>
                  {sn&&<polygon points={`${O.x},${O.y} ${A.x},${A.y} ${B.x},${B.y}`} fill="none" stroke="#93c5fd" strokeWidth={.9} strokeDasharray="5,3"/>}
                  <path d={`M ${O.x+U.x*13} ${O.y+U.y*13} L ${O.x+U.x*13+W.x*13} ${O.y+U.y*13+W.y*13} L ${O.x+W.x*13} ${O.y+W.y*13}`} fill="none" stroke={sc} strokeWidth={1.2} style={{pointerEvents:'none'}}/>
                  {sn&&perpEdge&&<line x1={perpEdge[0].x} y1={perpEdge[0].y} x2={perpEdge[1].x} y2={perpEdge[1].y} stroke={cranInfo?'#f59e0b':'#818cf8'} strokeWidth={cranInfo?2.5:1.5} strokeDasharray={cranInfo?undefined:"4,2"} style={{pointerEvents:'none'}}/>}
                  {sn&&<text x={(O.x+A.x+B.x)/3} y={(O.y+A.y+B.y)/3} fontSize={6} fill="#1d4ed8" textAnchor="middle" style={{pointerEvents:'none',fontFamily:'monospace',fontWeight:'bold'}}>{cranInfo?'✦ CRAN':'glisse'}</text>}
                  {!penMode&&<>
                    <circle cx={O.x} cy={O.y} r={hR}
                      fill={vO?'#f59e0b':sn?'#4f46e5':'#6366f1'} stroke="white"
                      strokeWidth={Math.max(.5,2/zoom)} data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxO',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxO',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <circle cx={O.x} cy={O.y} r={thR} fill="transparent" data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxO',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxO',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <line x1={O.x-U.x*hR*.35-W.x*hR*.35} y1={O.y-U.y*hR*.35-W.y*hR*.35}
                          x2={O.x+U.x*hR*.35+W.x*hR*.35} y2={O.y+U.y*hR*.35+W.y*hR*.35}
                          stroke="white" strokeWidth={Math.max(.3,1.5/zoom)} strokeLinecap="round" style={{pointerEvents:'none'}}/>
                    <circle cx={A.x} cy={A.y} r={hR}
                      fill={vA?'#f59e0b':sn?'#1e3a8a':'#1d4ed8'} stroke="white"
                      strokeWidth={Math.max(.5,2/zoom)} data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxA',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxA',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <circle cx={A.x} cy={A.y} r={thR} fill="transparent" data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxA',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxA',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <line x1={A.x-U.x*hR*.4} y1={A.y-U.y*hR*.4}
                          x2={A.x+U.x*hR*.4} y2={A.y+U.y*hR*.4}
                          stroke="white" strokeWidth={Math.max(.3,1.5/zoom)} strokeLinecap="round" style={{pointerEvents:'none'}}/>
                    <circle cx={B.x} cy={B.y} r={hR}
                      fill={vB?'#f59e0b':sn?'#1e3a8a':'#3b82f6'} stroke="white"
                      strokeWidth={Math.max(.5,2/zoom)} data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxB',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxB',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <circle cx={B.x} cy={B.y} r={thR} fill="transparent" data-i="1"
                      onMouseDown={e=>instrDrag(e,'vtxB',()=>({...sqR.current}),setSq,true,sLock,setSSnap)}
                      onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'vtxB',()=>({...sqR.current}),setSq,true,sLock,setSSnap);}}
                      style={{cursor:'crosshair'}}/>
                    <line x1={B.x-W.x*hR*.4} y1={B.y-W.y*hR*.4}
                          x2={B.x+W.x*hR*.4} y2={B.y+W.y*hR*.4}
                          stroke="white" strokeWidth={Math.max(.3,1.5/zoom)} strokeLinecap="round" style={{pointerEvents:'none'}}/>
                  </>}
                </g>;
              })()}

              {showC&&<g data-i="1">
                <circle cx={cmp.cx} cy={cmp.cy} r={cmp.radius} fill="none" stroke="#fca5a5" strokeWidth={.7} strokeDasharray="3,3" style={{pointerEvents:'none'}}/>
                <line x1={cmp.cx} y1={cmp.cy} x2={cpX} y2={cpY} stroke="#dc2626" strokeWidth={2.5} strokeLinecap="round" style={{pointerEvents:'none'}}/>
                <text x={(cmp.cx+cpX)/2+5} y={(cmp.cy+cpY)/2-4} fontSize={7} fill="#b91c1c" style={{pointerEvents:'none',fontFamily:'monospace'}}>r={Math.round(cmp.radius*10)/10}mm</text>
                {!penMode?<>
                  <circle cx={cmp.cx} cy={cmp.cy} r={8/zoom} fill="#dc2626" stroke="white" strokeWidth={2.5/zoom}
                    onMouseDown={cmpCenter}
                    onTouchStart={e=>{e.preventDefault();cmpCenter(toME(e));}}
                    style={{cursor:'move'}}/>
                  <circle cx={cmp.cx} cy={cmp.cy} r={thR} fill="transparent" data-i="1"
                    onMouseDown={cmpCenter}
                    onTouchStart={e=>{e.preventDefault();cmpCenter(toME(e));}}
                    style={{cursor:'move'}}/>
                  <circle cx={cmp.cx} cy={cmp.cy} r={2/zoom} fill="white" style={{pointerEvents:'none'}}/>
                  <circle cx={cpX} cy={cpY} r={6/zoom} fill="#f97316" stroke="white" strokeWidth={2/zoom} data-i="1"
                    onMouseDown={e=>instrDrag(e,'cmpR',()=>({...cmpR.current}),setCmp,false,{current:null},()=>{})}
                    onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'cmpR',()=>({...cmpR.current}),setCmp,false,{current:null},()=>{});}}
                    style={{cursor:'crosshair'}}/>
                  <circle cx={cpX} cy={cpY} r={thR} fill="transparent" data-i="1"
                    onMouseDown={e=>instrDrag(e,'cmpR',()=>({...cmpR.current}),setCmp,false,{current:null},()=>{})}
                    onTouchStart={e=>{e.preventDefault();instrDrag(toME(e),'cmpR',()=>({...cmpR.current}),setCmp,false,{current:null},()=>{});}}
                    style={{cursor:'crosshair'}}/>
                </>:<>
                  <circle cx={cmp.cx} cy={cmp.cy} r={3} fill="#dc2626" style={{pointerEvents:'none'}}/>
                  <circle cx={cpX} cy={cpY} r={3} fill="#f97316" style={{pointerEvents:'none'}}/>
                </>}
              </g>}

            </g>
          </svg>

          {(drawing||rSnap?.isDualSnap)&&(()=>{
            const k=chR.current?.k||null;
            const isDual=rSnap?.isDualSnap&&!drawing;
            let lenMM,locked;
            if(drawing){
              lenMM=vdst(V(drawing.x1,drawing.y1),V(drawing.x2,drawing.y2));
              locked=!!drawing.lockEdge;
            } else if(isDual){
              const aP=rSnap.anchorPt;
              const Opt=rSnap.rail?.pt;
              lenMM=aP&&Opt?vdst(aP,Opt):0;
              locked=true;
            }
            const lenCm=(lenMM/10).toFixed(1);
            return<div style={{position:'absolute',top:12,right:12,
              background:locked?'rgba(5,150,105,.9)':'rgba(15,23,42,.82)',
              color:'white',borderRadius:10,padding:'6px 13px',
              fontFamily:'monospace',fontSize:14,fontWeight:'bold',
              letterSpacing:'.3px',boxShadow:'0 2px 12px rgba(0,0,0,.25)',
              pointerEvents:'none',zIndex:50,
              display:'flex',flexDirection:'column',alignItems:'center',gap:2,
              backdropFilter:'blur(4px)',
              border:`1px solid ${locked?'rgba(52,211,153,.4)':'rgba(255,255,255,.1)'}`}}>
              <span style={{fontSize:9,opacity:.65,letterSpacing:'1px',textTransform:'uppercase'}}>
                {isDual?'OA':'longueur'}
              </span>
              <span style={{fontSize:21,lineHeight:1}}>{lenCm} <span style={{fontSize:12,opacity:.8}}>cm</span></span>
              {k!==null&&lenMM>0&&<>
                <div style={{height:1,width:'100%',background:'rgba(255,255,255,.15)',margin:'2px 0'}}/>
                <span style={{fontSize:11,color:'#86efac',fontWeight:'bold'}}>
                  × {kLabel(k)} = {(lenMM*Math.abs(k)/10).toFixed(1)} cm
                </span>
              </>}
            </div>;
          })()}
        </div>

        <aside className={`sb${sbOpen?' open':''}`}>

          <div className="sb-section">
            <div className="sb-label">Exercices</div>
            {[1,2,3,4,5].map(lv=>{
              const{col,label,k:lk}=LVCONF[lv],active=ch?.level===lv;
              const desc=label.split('—').slice(1).join('—').trim();
              return<button key={lv}
                className={`lv-card${active?' active':''}`}
                style={{'--lv-col':col}}
                onClick={()=>{startCh(lv);setSbOpen(false);}}>
                <span className="lv-k">{kLabel(lk)}</span>
                <span className="lv-info">
                  <strong>Niveau {lv}</strong>
                  <span>{desc}</span>
                </span>
                {active&&<span className="lv-badge">actif</span>}
              </button>;
            })}
            <button
              className={`lv-card${ch?.level==='libre'?' active':''}`}
              style={{'--lv-col':'#f59e0b'}}
              onClick={()=>{startFree();setSbOpen(false);}}>
              <span className="lv-k" style={{fontSize:18}}>✦</span>
              <span className="lv-info">
                <strong>Mode Libre</strong>
                <span>Exploration sans consigne</span>
              </span>
              {ch?.level==='libre'&&<span className="lv-badge">actif</span>}
            </button>
          </div>

          <div className="sb-section">
            <div className="sb-label">Instruments</div>
            <div className="instr-grid">
              {[
                {ico:'📏',lb:'Règle',   on:showR,fn:togR, col:'#b45309'},
                {ico:'📐',lb:'Équerre', on:showS,fn:togS, col:'#1d4ed8'},
                {ico:'⌓', lb:'Rapporteur',on:showP,fn:togP,col:'#7c3aed'},
                {ico:'🧭',lb:'Compas',  on:showC,fn:togC, col:'#dc2626'},
              ].map(({ico,lb,on,fn,col})=>(
                <button key={lb} className={`instr-btn${on?' on':''}`}
                  style={{'--instr-col':col}} onClick={fn}>
                  <span className="instr-ico">{ico}</span>
                  <span className="instr-lbl">{lb}</span>
                  <span className="instr-dot"/>
                </button>
              ))}
            </div>
          </div>

          {ch&&<div className="sb-section">
            <div className="sb-label">En cours</div>

            <div className="ccard">
              {isEx&&<span className="ccard-badge" style={{background:LVCONF[ch.level]?.col||'#64748b'}}>
                Niveau {ch.level} · k = {kLabel(ch.k||LVCONF[ch.level]?.k||1)}
              </span>}
              {ch.solved
                ? <div style={{display:'flex',alignItems:'center',gap:8,background:'#d1fae5',borderRadius:8,padding:'8px 10px',marginBottom:8}}>
                    <span style={{fontSize:20}}>✅</span>
                    <span style={{fontSize:11.5,fontWeight:700,color:'#065f46',lineHeight:1.4}}>Bravo ! Bonne réponse.</span>
                  </div>
                : <div className="ccard-text">{CONSIGNE[ch.level]}</div>
              }
            </div>

            {validMsg&&<div className={`vcard ${validMsg.ok?'vok':'verr'}`}>{validMsg.msg}</div>}

            {isEx&&!ch.solved&&<button className="abtn"
              style={{background:'#1d4ed8',color:'#fff'}}
              onClick={validate}>✔ Valider ma réponse</button>}

            {isEx&&ch.solved&&<button className="abtn"
              style={{background:LVCONF[ch.level]?.col||'#059669',color:'#fff',animation:'bounce 1.3s infinite'}}
              onClick={()=>startCh(ch.level)}>↺ Rejouer Niveau {ch.level}</button>}

            {isEx&&!ch.showSolution&&<button className="abtn-ghost"
              onClick={()=>setCh(c=>({...c,showSolution:true}))}>👁 Voir la solution</button>}

            {isEx&&ch.showSolution&&<div style={{fontSize:11,color:'#059669',fontWeight:600,
              textAlign:'center',padding:'4px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:'#059669',display:'inline-block'}}/>
              Solution visible en vert
            </div>}

            <button className="abtn-ghost"
              style={{color:'#dc2626',borderColor:'#fca5a5'}}
              onClick={clearStudent}>🗑 Effacer mes tracés</button>
          </div>}

          {ch&&<div className="sb-section" style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',gap:0}}>
            <div style={{background:'#fff',borderRadius:10,padding:'11px 13px',border:'1.5px solid var(--sand-200)'}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--sand-300)',marginBottom:6}}>Formule clé</div>
              <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontStyle:'italic',fontSize:15,color:'#1e1b16',marginBottom:8}}>
                OA⃗' = k · OA⃗
              </div>
              <div style={{fontSize:10,color:'#9a9087',lineHeight:1.65}}>
                <div>① Pose la règle sur O et A</div>
                <div>② Lis la distance OA en cm</div>
                <div>③ Multiplie par k → place A'</div>
              </div>
            </div>
            <div style={{marginTop:8,fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--sand-300)',textAlign:'center'}}>
              {segs.filter(s=>!s.locked).length}seg · {named.filter(n=>!n.locked).length}pts
              {snapD&&snapD.kind!=='none'&&<span style={{color:SC[snapD.kind]||'#aaa',marginLeft:6,fontWeight:600}}>{SL[snapD.kind]}</span>}
            </div>
          </div>}
        </aside>
      </div>

      <button className="sb-toggle" onClick={()=>setSbOpen(o=>!o)} aria-label="Menu">
        {sbOpen?'✕':'☰'}
      </button>

      <div className="sbar">
        <span className="sbar-chip">{Math.round(zoom/IZ*100)}%</span>
        <span className="sbar-chip">∠{Math.round(cva)}°</span>
        {isEx&&<span className="sbar-chip" style={{color:LVCONF[ch.level]?.col,borderColor:LVCONF[ch.level]?.col+'44',background:LVCONF[ch.level]?.col+'18'}}>
          N{ch.level} · k={kLabel(ch.k||LVCONF[ch.level]?.k||1)}
        </span>}
        {rSnap&&<span className="sbar-chip" style={{color:'#fbbf24'}}>📏 🔒</span>}
        {sSnap&&<span className="sbar-chip" style={{color:'#60a5fa'}}>📐 🔒</span>}
        <span style={{marginLeft:'auto',opacity:.4}}>⌘Z / ⌘Y</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<a href="index.html" class="btn-retour-flottant">
    <span>🏠</span> Menu
</a>

<style>
    .btn-retour-flottant {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
        background: white;
        color: #5c67f2;
        text-decoration: none;
        font-family: Quicksand, sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 10px 18px;
        border-radius: 50px;
        border: 2px solid #5c67f2;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
    }
    .btn-retour-flottant:hover {
        transform: scale(1.05);
        background: #5c67f2;
        color: white;
    }
    @media (max-width: 600px) {
        .btn-retour-flottant {
            top: auto;
            bottom: 20px;
            left: 20px;
            padding: 12px 22px;
            font-size: 1rem;
        }
    }
</style>
</body>
</html>
