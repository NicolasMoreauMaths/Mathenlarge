name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Injecter la clé API
        run: |
          KEY="${{ secrets.GROQ_API_KEY }}"
          P1="${KEY:0:20}"
          P2="${KEY:20}"
          sed -i "s/%%GROQ_KEY_P1%%/$P1/g" index.html
          sed -i "s/%%GROQ_KEY_P2%%/$P2/g" index.html

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
