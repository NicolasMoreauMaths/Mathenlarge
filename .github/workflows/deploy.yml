name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Injecter la clé API
        run: |
          ENCODED=$(echo -n "${{ secrets.GROQ_API_KEY }}" | base64)
          sed -i "s/%%GROQ_API_KEY%%/$ENCODED/g" index.html

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
