name: Ajouter la calculatrice

on:
  workflow_dispatch:

jobs:
  ajouter-calculatrice:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Ajouter le script calculatrice dans les fichiers exercices
        run: |
          FILES=(
            "3eme_ch10_exercice1.html" "3eme_ch10_exercice2.html" "3eme_ch10_exercice3.html"
            "3eme_ch10_exercice4.html" "3eme_ch11_exercice1.html" "3eme_ch11_exercice2.html"
            "3eme_ch11_exercice3.html" "3eme_ch11_exercice4.html" "3eme_ch12_exercice1.html"
            "3eme_ch12_exercice2.html" "3eme_ch13_exercice1.html" "3eme_ch13_exercice2.html"
            "3eme_ch13_exercice3.html" "3eme_ch14_exercice1.html" "3eme_ch15_exercice1.html"
            "3eme_ch16_exercice1.html" "3eme_ch16_exercice2.html" "3eme_ch16_exercice3.html"
            "3eme_ch16_exercice4.html" "3eme_ch17_exercice1.html" "3eme_ch17_exercice2.html"
            "3eme_ch17_exercice3.html" "3eme_ch18_exercice1.html" "3eme_ch19_exercice1.html"
            "3eme_ch19_exercice2.html" "3eme_ch19_exercice3.html" "3eme_ch19_exercice4.html"
            "3eme_ch19_exercice5.html" "3eme_ch20_exercice1.html" "3eme_ch20_exercice10.html"
            "3eme_ch20_exercice2.html" "3eme_ch20_exercice3.html" "3eme_ch20_exercice4.html"
            "3eme_ch20_exercice5.html" "3eme_ch20_exercice6.html" "3eme_ch20_exercice7.html"
            "3eme_ch20_exercice8.html" "3eme_ch20_exercice9.html" "3eme_ch2_exercice1.html"
            "3eme_ch2_exercice2.html" "3eme_ch2_exercice3.html" "3eme_ch3_exercice1.html"
            "3eme_ch3_exercice2.html" "3eme_ch4_exercice1.html" "3eme_ch4_exercice2.html"
            "3eme_ch4_exercice3.html" "3eme_ch4_exercice4.html" "3eme_ch4_exercice5.html"
            "3eme_ch5_exercice1.html" "3eme_ch5_exercice2.html" "3eme_ch5_exercice3.html"
            "3eme_ch6_exercice1.html" "3eme_ch6_exercice2.html" "3eme_ch6_exercice3.html"
            "3eme_ch7_exercice1.html" "3eme_ch7_exercice2.html" "3eme_ch7_exercice3.html"
            "3eme_ch7_exercice4.html" "3eme_ch8_exercice1.html" "3eme_ch8_exercice2.html"
            "3eme_ch8_exercice3.html" "3eme_ch8_exercice4.html" "3eme_ch9_exercice1.html"
            "3eme_ch9_exercice2.html" "3eme_ch9_exercice3.html" "3eme_ch9_exercice4.html"
            "4eme_ch10_exercice1.html" "4eme_ch10_exercice2.html" "4eme_ch11_exercice1.html"
            "4eme_ch12_exercice1.html" "4eme_ch13_exercice1.html" "4eme_ch13_exercice2.html"
            "4eme_ch13_exercice3.html" "4eme_ch13_exercice4.html" "4eme_ch14_exercice1.html"
            "4eme_ch14_exercice2.html" "4eme_ch14_exercice3.html" "4eme_ch15_exercice1.html"
            "4eme_ch15_exercice2.html" "4eme_ch16_exercice1.html" "4eme_ch17_exercice1.html"
            "4eme_ch17_exercice2.html" "4eme_ch17_exercice3.html" "4eme_ch18_exercice1.html"
            "4eme_ch18_exercice2.html" "4eme_ch18_exercice3.html" "4eme_ch18_exercice4.html"
            "4eme_ch19_exercice1.html" "4eme_ch19_exercice2.html" "4eme_ch20_exercice1.html"
            "4eme_ch21_exercice1.html" "4eme_ch21_exercice2.html" "4eme_ch21_exercice3.html"
            "4eme_ch22_exercice1.html" "4eme_ch22_exercice2.html" "4eme_ch22_exercice3.html"
            "4eme_ch22_exercice4.html" "4eme_ch2_exercice1.html" "4eme_ch2_exercice2.html"
            "4eme_ch2_exercice3.html" "4eme_ch2_exercice4.html" "4eme_ch3_exercice1.html"
            "4eme_ch3_exercice2.html" "4eme_ch3_exercice3.html" "4eme_ch4_exercice1.html"
            "4eme_ch4_exercice2.html" "4eme_ch5_exercice1.html" "4eme_ch5_exercice2.html"
            "4eme_ch5_exercice3.html" "4eme_ch6_exercice1.html" "4eme_ch6_exercice2.html"
            "4eme_ch6_exercice3.html" "4eme_ch7_exercice1.html" "4eme_ch7_exercice2.html"
            "4eme_ch7_exercice3.html" "4eme_ch7_exercice4.html" "4eme_ch8_exercice1.html"
            "4eme_ch8_exercice2.html" "4eme_ch8_exercice3.html" "4eme_ch9_exercice1.html"
            "4eme_ch9_exercice2.html" "4eme_ch9_exercice3.html" "5eme_ch10_exercice1.html"
            "5eme_ch10_exercice2.html" "5eme_ch10_exercice3.html" "5eme_ch10_exercice4.html"
            "5eme_ch10_exercice5.html" "5eme_ch11_exercice1.html" "5eme_ch11_exercice2.html"
            "5eme_ch12_exercice1.html" "5eme_ch13_exercice1.html" "5eme_ch13_exercice2.html"
            "5eme_ch13_exercice3.html" "5eme_ch13_exercice4.html" "5eme_ch14_exercice1.html"
            "5eme_ch14_exercice2.html" "5eme_ch14_exercice3.html" "5eme_ch15_exercice1.html"
            "5eme_ch16_exercice1.html" "5eme_ch17_exercice1.html" "5eme_ch18_exercice1.html"
            "5eme_ch19_exercice1.html" "5eme_ch19_exercice2.html" "5eme_ch20_exercice1.html"
            "5eme_ch20_exercice2.html" "5eme_ch20_exercice3.html" "5eme_ch3_exercice1.html"
            "5eme_ch3_exercice2.html" "5eme_ch3_exercice3.html" "5eme_ch4_exercice1.html"
            "5eme_ch5_exercice1.html" "5eme_ch5_exercice2.html" "5eme_ch5_exercice3.html"
            "5eme_ch6_exercice1.html" "5eme_ch6_exercice2.html" "5eme_ch7_exercice1.html"
            "5eme_ch7_exercice2.html" "5eme_ch8_exercice1.html" "5eme_ch8_exercice2.html"
            "5eme_ch8_exercice3.html" "5eme_ch9_exercice1.html" "5eme_ch9_exercice2.html"
          )

          COUNT=0
          SKIPPED=0
          for FILE in "${FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "⚠️  Introuvable : $FILE"
              ((SKIPPED++))
              continue
            fi
            if grep -q "calculatrice.js" "$FILE"; then
              echo "✅ Déjà présent : $FILE"
              ((SKIPPED++))
              continue
            fi
            sed -i 's|</body>|    <!-- Calculatrice flottante -->\n    <script src="calculatrice.js" defer></script>\n</body>|' "$FILE"
            echo "✔  Modifié : $FILE"
            ((COUNT++))
          done
          echo ""
          echo "✔ $COUNT fichiers modifiés, $SKIPPED ignorés"

      - name: Committer les modifications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "✨ Ajout de la calculatrice flottante sur les fichiers exercices"
          git push
