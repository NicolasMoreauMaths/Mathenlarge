<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu de Dames</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #080504;
  --bg1: #120b07;
  --wood0: #1e0e08;
  --wood1: #4a2210;
  --wood2: #7a3e1e;
  --wood3: #a05828;
  --sq-dark: #6b3510;
  --sq-light: #e8d5a0;
  --gold: #c9922a;
  --gold2: #e8b84b;
  --gold3: #ffd980;
  --cream: #f8edd8;
  --muted: #8a6840;
  --pw: #f0ebe0;
  --pw2: #c8c0b0;
  --glow-g: rgba(200,160,50,0.45);
  --glow-w: rgba(240,235,224,0.3);
  --step: 350ms;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg0);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Raleway',sans-serif;
  color:var(--cream);
  padding:16px;
  overflow-x:hidden;
}

/* noise grain overlay */
body::before {
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* ambient light blobs */
body::after {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(160,90,30,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 90%, rgba(100,60,20,0.06) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

.container {
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:20px;width:100%;max-width:720px;
}

/* ── HEADER ── */
header { text-align:center; animation:fadeDown .9s ease both; }
header h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5.5vw,4rem);
  font-weight:900;
  letter-spacing:.22em;
  color:var(--gold2);
  text-shadow:0 0 50px var(--glow-g),0 0 20px rgba(200,140,40,.3),0 3px 6px rgba(0,0,0,.9);
  line-height:1;
}
header p {
  font-size:clamp(.52rem,1.4vw,.65rem);
  letter-spacing:.45em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:7px;
  font-weight:500;
}

/* ── DIFFICULTY ── */
.difficulty-bar {
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px;
  background:rgba(0,0,0,.5);
  padding:5px;border-radius:100px;
  border:1px solid rgba(200,145,42,.12);
  animation:fadeUp .9s .15s ease both;
}
.diff-btn {
  padding:7px 16px;border-radius:100px;border:none;
  background:transparent;color:var(--muted);
  font-family:'Raleway',sans-serif;font-size:clamp(.58rem,1.6vw,.68rem);
  font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;transition:all .25s ease;white-space:nowrap;
}
.diff-btn:hover{color:var(--gold2);}
.diff-btn.active {
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--wood0);font-weight:700;
  box-shadow:0 2px 14px var(--glow-g);
}

/* ── STATUS BAR ── */
.status-bar {
  display:flex;align-items:center;justify-content:space-between;
  width:100%;gap:10px;
  animation:fadeUp .9s .25s ease both;
}
.player-card {
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  border:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(4px);
  transition:all .35s ease;
  flex:1;min-width:0;
  position:relative;overflow:hidden;
}
.player-card::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);
  pointer-events:none;
}
.player-card.active-black {
  border-color:rgba(180,180,180,.25);
  background:rgba(120,120,120,.07);
  box-shadow:0 0 22px rgba(160,160,160,.12),inset 0 1px 0 rgba(255,255,255,.06);
}
.player-card.active-white {
  border-color:rgba(200,148,45,.35);
  background:rgba(200,148,45,.06);
  box-shadow:0 0 22px rgba(200,148,45,.15),inset 0 1px 0 rgba(255,220,100,.08);
}
.player-gem {
  width:22px;height:22px;border-radius:50%;flex-shrink:0;position:relative;
}
.player-gem.black {
  background:radial-gradient(circle at 33% 28%,#787878,#181818 55%,#050505);
  box-shadow:0 3px 8px rgba(0,0,0,.85),inset 0 1px 3px rgba(255,255,255,.18),inset 0 -2px 4px rgba(0,0,0,.7);
  border:1px solid #525252;
}
.player-gem.white {
  background:radial-gradient(circle at 33% 28%,#ffffff,var(--pw) 50%,var(--pw2));
  box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 3px rgba(255,255,255,.9),inset 0 -2px 4px rgba(0,0,0,.18);
  border:1px solid rgba(0,0,0,.1);
}
.player-info {min-width:0;}
.player-role {font-size:clamp(.5rem,1.3vw,.62rem);letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.player-name {font-family:'Playfair Display',serif;font-size:clamp(.82rem,2.2vw,.98rem);font-weight:700;color:var(--cream);white-space:nowrap;}
.player-score {
  font-size:clamp(.58rem,1.4vw,.7rem);
  color:var(--gold);margin-top:1px;font-weight:500;
  transition:color .3s ease;
}
.player-score.cap-flash { color:var(--gold3) !important; }

.status-center {
  text-align:center;flex:0 0 auto;padding:0 8px;min-width:80px;
}
#status-msg {
  font-family:'Playfair Display',serif;
  font-size:clamp(.8rem,2.2vw,1rem);
  font-weight:700;color:var(--gold2);
  text-shadow:0 0 20px var(--glow-g);
  transition:all .25s ease;line-height:1.35;
  min-height:1.35em;
}
.thinking-indicator {
  display:none;align-items:center;justify-content:center;gap:5px;
  font-size:clamp(.56rem,1.4vw,.66rem);color:var(--muted);
  letter-spacing:.14em;text-transform:uppercase;font-weight:600;
  margin-top:3px;
}
.thinking-indicator.show{display:flex;}
.td{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:think 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}

/* ── BOARD WRAPPER ── */
.board-wrapper {
  position:relative;
  animation:fadeUp .9s .35s ease both;
  width:100%;display:flex;justify-content:center;
}

/* Decorative corner marks */
.board-wrapper::before,.board-wrapper::after {
  content:'';position:absolute;
  width:40px;height:40px;
  border-color:var(--gold);border-style:solid;
  opacity:.3;z-index:2;pointer-events:none;
}
.board-wrapper::before { top:-6px;left:calc(50% - var(--bw)/2 - 6px);border-width:2px 0 0 2px; }
.board-wrapper::after  { bottom:-6px;right:calc(50% - var(--bw)/2 - 6px);border-width:0 2px 2px 0; }
.board-wrapper { --bw: min(520px, 90vw, 66vh); }

.board-frame {
  background:
    repeating-linear-gradient(87deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 6px),
    repeating-linear-gradient(3deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 8px),
    linear-gradient(135deg,var(--wood0) 0%,var(--wood1) 30%,var(--wood2) 55%,var(--wood3) 72%,var(--wood1) 88%,var(--wood0) 100%);
  padding:clamp(10px,2.8vw,20px);
  border-radius:10px;
  box-shadow:
    0 0 0 1px rgba(200,148,42,.25),
    0 0 0 4px rgba(0,0,0,.7),
    0 0 0 5px rgba(200,148,42,.1),
    0 28px 80px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,200,80,.12),
    inset 0 -1px 0 rgba(0,0,0,.5);
  position:relative;
}

#board {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  --board-size: min(520px,90vw,66vh);
  width:var(--board-size);height:var(--board-size);
  border:1px solid rgba(0,0,0,.6);
  box-shadow:inset 0 0 40px rgba(0,0,0,.4);
  position:relative;
}

/* ── CELLS ── */
.cell {
  position:relative;display:flex;align-items:center;justify-content:center;
  cursor:default;
}
.cell.light { background-color:var(--sq-light); }
.cell.dark  { background-color:var(--sq-dark); }
.cell.dark::after {
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(145deg,rgba(255,255,255,.045) 0%,transparent 45%,rgba(0,0,0,.12) 100%);
}
.cell.light::after {
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(145deg,rgba(255,255,255,.18) 0%,transparent 50%);
}

/* selectable pulse */
.cell.selectable{cursor:pointer;}
.cell.selectable::before {
  content:'';position:absolute;inset:3px;
  border:2px solid var(--gold2);border-radius:3px;
  opacity:.55;z-index:2;pointer-events:none;
  animation:pulse-sel 1.6s ease-in-out infinite;
}
/* selected overlay */
.cell.selected::before {
  content:'';position:absolute;inset:0;
  background:rgba(210,160,50,.22);z-index:2;pointer-events:none;
}
/* move target dot */
.move-dot {
  position:absolute;
  width:30%;height:30%;border-radius:50%;
  background:rgba(80,200,100,.42);
  border:2px solid rgba(80,200,100,.7);
  z-index:3;pointer-events:none;
  animation:pop-dot .18s ease both;
}

/* ── PIECES ── */
.piece {
  width:78%;height:78%;border-radius:50%;
  position:relative;z-index:4;pointer-events:none;
}
.piece.is-new { animation:piece-in .32s cubic-bezier(.34,1.56,.64,1) both; }

.piece.black {
  background:
    radial-gradient(circle at 31% 26%, #888 0%,#2a2a2a 38%,#101010 60%,#030303 100%);
  box-shadow:
    0 5px 12px rgba(0,0,0,.88),
    0 2px 4px rgba(0,0,0,.6),
    inset 0 1px 4px rgba(255,255,255,.2),
    inset 0 -3px 7px rgba(0,0,0,.75);
  border:1px solid #3e3e3e;
}
.piece.white {
  background:
    radial-gradient(circle at 31% 26%,#fff 0%,#f0ece4 38%,#d8d2c4 70%,#b8b0a0 100%);
  box-shadow:
    0 5px 10px rgba(0,0,0,.55),
    0 2px 4px rgba(0,0,0,.35),
    inset 0 1px 4px rgba(255,255,255,.95),
    inset 0 -3px 7px rgba(0,0,0,.22);
  border:1px solid rgba(0,0,0,.12);
}

/* king crown */
.piece.king::after {
  content:'♛';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:47%;line-height:1;padding-bottom:3%;
}
.piece.black.king::after { color:var(--gold2);text-shadow:0 1px 4px rgba(0,0,0,.95); }
.piece.white.king::after { color:var(--wood1);text-shadow:0 1px 2px rgba(255,255,255,.6); }

/* selected lift */
.cell.selected .piece {
  transform:scale(1.12) translateY(-5px);
  box-shadow:
    0 12px 28px rgba(0,0,0,.75),
    0 0 20px var(--glow-g) !important;
}

/* capture flash animation */
.piece.cap-flash {
  animation:cap-flash .34s ease forwards !important;
}

/* ── CONTROLS ── */
.controls {
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .9s .45s ease both;
}
.btn {
  padding:10px 22px;border-radius:7px;
  border:1px solid rgba(200,148,42,.28);
  background:rgba(0,0,0,.45);color:var(--gold);
  font-family:'Raleway',sans-serif;font-size:clamp(.6rem,1.7vw,.7rem);
  font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .25s ease;white-space:nowrap;
}
.btn:hover {
  background:rgba(200,148,42,.1);border-color:var(--gold2);
  box-shadow:0 0 18px rgba(200,148,42,.2);transform:translateY(-2px);
}
.btn.primary {
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--wood0);border-color:transparent;font-weight:700;
}
.btn.primary:hover {
  background:linear-gradient(135deg,var(--gold3),var(--gold2));
  box-shadow:0 5px 22px var(--glow-g);
}

/* ── WIN OVERLAY ── */
#overlay {
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:100;
  align-items:center;justify-content:center;
  backdrop-filter:blur(8px);padding:16px;
}
#overlay.show{display:flex;animation:fadeIn .4s ease;}
.overlay-card {
  background:linear-gradient(160deg,var(--wood0) 0%,#1a0d08 60%,#100805 100%);
  border:1px solid rgba(200,148,42,.35);border-radius:18px;
  padding:clamp(28px,6vw,52px) clamp(32px,8vw,64px);
  text-align:center;max-width:380px;width:100%;
  box-shadow:0 0 80px rgba(200,148,42,.2),0 40px 100px rgba(0,0,0,.9);
  animation:overlay-in .55s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;overflow:hidden;
}
.overlay-card::before {
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(200,148,42,.08) 0%,transparent 70%);
  pointer-events:none;
}
.overlay-card h2 {
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,8vw,3.4rem);font-weight:900;
  color:var(--gold2);text-shadow:0 0 40px var(--glow-g);
  margin-bottom:8px;
}
.overlay-card p {
  color:var(--muted);font-size:clamp(.68rem,1.8vw,.82rem);
  letter-spacing:.25em;text-transform:uppercase;
  margin-bottom:32px;font-weight:500;
}

/* ── RESPONSIVE ── */
@media(max-width:420px){
  .container{gap:12px;}
  .status-bar{gap:5px;}
  .player-card{padding:6px 9px;gap:6px;}
  .player-role{display:none;}
  .status-center{padding:0 3px;min-width:60px;}
  .diff-btn{padding:5px 9px;}
}
@media(min-width:600px)and(max-width:900px){
  #board{--board-size:min(540px,84vw,64vh);}
}
@media(min-width:900px){
  #board{--board-size:min(600px,68vw,74vh);}
  .container{gap:24px;}
}

/* ── KEYFRAMES ── */
@keyframes fadeDown  {from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:none}}
@keyframes fadeUp    {from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none}}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes pulse-sel {0%,100%{opacity:.35}50%{opacity:.9}}
@keyframes pop-dot   {from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes piece-in  {from{transform:scale(0) rotate(-200deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes overlay-in{from{transform:scale(.82) translateY(18px);opacity:0}to{transform:none;opacity:1}}
@keyframes think     {0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}
@keyframes cap-flash {
  0%  {transform:scale(1);   filter:brightness(1);}
  25% {transform:scale(1.3); filter:brightness(3) saturate(0);}
  60% {transform:scale(.6);  filter:brightness(.8) saturate(0);opacity:.5;}
  100%{transform:scale(0);   filter:brightness(0);opacity:0;}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>DAMES</h1>
    <p>Jeu de dames · 10×10 · Règles officielles françaises</p>
  </header>

  <div class="difficulty-bar">
    <button class="diff-btn active" data-level="1">Débutant</button>
    <button class="diff-btn" data-level="2">Intermédiaire</button>
    <button class="diff-btn" data-level="3">Expert</button>
    <button class="diff-btn" data-level="4">Maître</button>
  </div>

  <div class="status-bar">
    <div class="player-card" id="pc-black">
      <div class="player-gem black"></div>
      <div class="player-info">
        <div class="player-role">Joueur</div>
        <div class="player-name">Noir</div>
        <div class="player-score" id="score-black">20 pièces · 0 pris</div>
      </div>
    </div>

    <div class="status-center">
      <div id="status-msg">À vous de jouer</div>
      <div class="thinking-indicator" id="thinking">
        <div class="td"></div><div class="td"></div><div class="td"></div>
        <span>Réflexion</span>
      </div>
    </div>

    <div class="player-card" id="pc-white">
      <div class="player-gem white"></div>
      <div class="player-info">
        <div class="player-role">Ordinateur</div>
        <div class="player-name">Blanc</div>
        <div class="player-score" id="score-white">20 pièces · 0 pris</div>
      </div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board-frame">
      <div id="board"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-undo">↩ Annuler</button>
    <button class="btn primary" id="btn-new">Nouvelle partie</button>
  </div>
</div>

<div id="overlay">
  <div class="overlay-card">
    <h2 id="ov-title">Victoire !</h2>
    <p  id="ov-sub">Les noirs ont gagné</p>
    <button class="btn primary" onclick="newGame()">Rejouer</button>
  </div>
</div>

<script>
/* ============================================================
   JEU DE DAMES 10×10 — moteur complet
   Nouveautés : captures animées étape par étape + design premium
============================================================ */

const ROWS=10, COLS=10;
const EMPTY=0, BLACK=1, WHITE=2, BK=3, WK=4;

let board, turn, selected, legalMoves, history;
let aiLevel, gameOver, gen;
let capsBlack=0, capsWhite=0; // prises totales
let prevSnap=null;
let animating=false;

/* ── helpers ─────────────────────────────────────────────── */
const isB  = p=>p===BLACK||p===BK;
const isW  = p=>p===WHITE||p===WK;
const isK  = p=>p===BK||p===WK;
const owns = (p,t)=>t===BLACK?isB(p):isW(p);
const opp  = t=>t===BLACK?WHITE:BLACK;
const cloneB=b=>b.map(r=>r.slice());

/* ── init ─────────────────────────────────────────────────── */
function initBoard(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(EMPTY));
  for(let r=0;r<4;r++)  for(let c=0;c<COLS;c++) if((r+c)%2===1) board[r][c]=WHITE;
  for(let r=6;r<ROWS;r++) for(let c=0;c<COLS;c++) if((r+c)%2===1) board[r][c]=BLACK;
  prevSnap=null;
}

/* ── génération coups normaux ─────────────────────────────── */
function genNormals(b,r,c){
  const p=b[r][c],moves=[];
  const dirs=isK(p)?[[-1,-1],[-1,1],[1,-1],[1,1]]:isB(p)?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
  for(const [dr,dc] of dirs){
    if(isK(p)){
      let nr=r+dr,nc=c+dc;
      while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&b[nr][nc]===EMPTY){
        moves.push({from:[r,c],to:[nr,nc],caps:[],path:[[r,c],[nr,nc]]});
        nr+=dr;nc+=dc;
      }
    } else {
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&b[nr][nc]===EMPTY)
        moves.push({from:[r,c],to:[nr,nc],caps:[],path:[[r,c],[nr,nc]]});
    }
  }
  return moves;
}

/* ── génération captures (DFS) ────────────────────────────────
   path : tableau de toutes les positions visitées par la pièce
          ex. multi-capture : [[3,2],[5,4],[3,6]]
   caps : pièces capturées dans l'ordre
   `from` est toujours la case de départ originale.
─────────────────────────────────────────────────────────────── */
function genCaps(b,r,c,t,origR,origC,caps,path){
  if(origR===undefined){origR=r;origC=c;path=[[r,c]];}
  const p=b[r][c],results=[];
  for(const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]){
    if(isK(p)){
      let nr=r+dr,nc=c+dc;
      while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&b[nr][nc]===EMPTY){nr+=dr;nc+=dc;}
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      if(!owns(b[nr][nc],opp(t)))continue;
      const er=nr,ec=nc;
      let lr=er+dr,lc=ec+dc;
      while(lr>=0&&lr<ROWS&&lc>=0&&lc<COLS&&b[lr][lc]===EMPTY){
        const newCaps=[...caps,[er,ec]];
        const newPath=[...path,[lr,lc]];
        const nb=cloneB(b);nb[r][c]=EMPTY;nb[er][ec]=EMPTY;nb[lr][lc]=p;
        const sub=genCaps(nb,lr,lc,t,origR,origC,newCaps,newPath);
        if(sub.length) for(const s of sub) results.push(s);
        else results.push({from:[origR,origC],to:[lr,lc],caps:newCaps,path:newPath});
        lr+=dr;lc+=dc;
      }
    } else {
      const er=r+dr,ec=c+dc,lr=r+2*dr,lc=c+2*dc;
      if(er<0||er>=ROWS||ec<0||ec>=COLS)continue;
      if(lr<0||lr>=ROWS||lc<0||lc>=COLS)continue;
      if(!owns(b[er][ec],opp(t)))continue;
      if(b[lr][lc]!==EMPTY)continue;
      const newCaps=[...caps,[er,ec]];
      const newPath=[...path,[lr,lc]];
      const nb=cloneB(b);nb[r][c]=EMPTY;nb[er][ec]=EMPTY;nb[lr][lc]=p;
      const sub=genCaps(nb,lr,lc,t,origR,origC,newCaps,newPath);
      if(sub.length) for(const s of sub) results.push(s);
      else results.push({from:[origR,origC],to:[lr,lc],caps:newCaps,path:newPath});
    }
  }
  return results;
}

/* ── tous les coups légaux ────────────────────────────────── */
function genMoves(b,t){
  const caps=[],normals=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!owns(b[r][c],t))continue;
    const pc=genCaps(b,r,c,t,r,c,[],[[r,c]]);
    if(pc.length) for(const m of pc) caps.push(m);
    else for(const m of genNormals(b,r,c)) normals.push(m);
  }
  if(!caps.length) return normals;
  const mx=Math.max(...caps.map(m=>m.caps.length));
  return caps.filter(m=>m.caps.length===mx);
}

/* ── appliquer un coup complet ────────────────────────────── */
function applyMove(b,mv){
  const [fr,fc]=mv.from,[tr,tc]=mv.to,p=b[fr][fc];
  b[tr][tc]=p;b[fr][fc]=EMPTY;
  for(const [cr,cc] of mv.caps) b[cr][cc]=EMPTY;
  if(p===BLACK&&tr===0)     b[tr][tc]=BK;
  if(p===WHITE&&tr===ROWS-1)b[tr][tc]=WK;
}

/* ── évaluation ───────────────────────────────────────────── */
function evaluate(b){
  let s=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=b[r][c];if(!p)continue;
    let v=isK(p)?3:1;
    if(!isK(p)) v+=isB(p)?(ROWS-1-r)*.05:r*.05;
    v+=(1-(Math.abs(r-4.5)+Math.abs(c-4.5))/8)*.1;
    s+=isW(p)?v:-v;
  }
  return s;
}

/* ── minimax alpha-bêta ───────────────────────────────────── */
function minimax(b,depth,alpha,beta,max){
  const t=max?WHITE:BLACK,moves=genMoves(b,t);
  if(!depth||!moves.length)return evaluate(b);
  if(max){
    let best=-Infinity;
    for(const mv of moves){const nb=cloneB(b);applyMove(nb,mv);best=Math.max(best,minimax(nb,depth-1,alpha,beta,false));alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  } else {
    let best=Infinity;
    for(const mv of moves){const nb=cloneB(b);applyMove(nb,mv);best=Math.min(best,minimax(nb,depth-1,alpha,beta,true));beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}

function getBestMove(){
  const moves=genMoves(board,WHITE);
  if(!moves.length)return null;
  if(aiLevel===1&&Math.random()<.7)return moves[Math.floor(Math.random()*moves.length)];
  const depth=[0,2,4,6,8][aiLevel];
  let best=null,bestScore=-Infinity;
  for(const mv of [...moves].sort(()=>Math.random()-.5)){
    const nb=cloneB(board);applyMove(nb,mv);
    const score=minimax(nb,depth,-Infinity,Infinity,false);
    if(score>bestScore){bestScore=score;best=mv;}
  }
  return best;
}

/* ── rendu ────────────────────────────────────────────────── */
function render(flashCap=null){
  const el=document.getElementById('board');
  const snap=prevSnap;
  el.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'light':'dark');
    if((r+c)%2===1){
      const isSel    =!animating&&selected&&selected[0]===r&&selected[1]===c;
      const isTarget =!animating&&legalMoves&&legalMoves.some(m=>m.to[0]===r&&m.to[1]===c);
      const isFriend =!animating&&owns(board[r][c],BLACK)&&!gameOver&&turn===BLACK;

      if(isSel){cell.classList.add('selected');cell.addEventListener('click',()=>onClick(r,c));}
      else if(isTarget){
        const dot=document.createElement('div');dot.className='move-dot';cell.appendChild(dot);
        cell.style.cursor='pointer';cell.addEventListener('click',()=>onClick(r,c));
      } else if(isFriend){
        const allM=genMoves(board,BLACK);
        const myM=allM.filter(m=>m.from[0]===r&&m.from[1]===c);
        if(myM.length){
          if(!selected)cell.classList.add('selectable');
          cell.addEventListener('click',()=>onClick(r,c));
        }
      }
      const p=board[r][c];
      if(p){
        const piece=document.createElement('div');
        const isNew=!snap||snap[r][c]===EMPTY;
        const isFlash=flashCap&&flashCap[0]===r&&flashCap[1]===c;
        piece.className=`piece ${isB(p)?'black':'white'}${isK(p)?' king':''}${isNew&&!isFlash?' is-new':''}${isFlash?' cap-flash':''}`;
        cell.appendChild(piece);
      }
    }
    el.appendChild(cell);
  }
  prevSnap=cloneB(board);
  updateScores();
}

/* ── scores ───────────────────────────────────────────────── */
function updateScores(){
  let b=0,w=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){if(isB(board[r][c]))b++;if(isW(board[r][c]))w++;}
  document.getElementById('score-black').textContent=`${b} pièce${b>1?'s':''} · ${capsBlack} pris`;
  document.getElementById('score-white').textContent=`${w} pièce${w>1?'s':''} · ${capsWhite} pris`;
}

function flashScore(who){
  const el=document.getElementById(who==='black'?'score-black':'score-white');
  el.classList.add('cap-flash');
  setTimeout(()=>el.classList.remove('cap-flash'),700);
}

function setStatus(m){document.getElementById('status-msg').textContent=m;}

function setActive(){
  document.getElementById('pc-black').className='player-card'+(turn===BLACK?' active-black':'');
  document.getElementById('pc-white').className='player-card'+(turn===WHITE?' active-white':'');
}

/* ── animation multi-captures ────────────────────────────────
   Anime chaque saut séparément :
   - affiche le flash sur la pièce capturée
   - après 340ms, la retire et déplace le pion attaquant
   - répète pour chaque capture
   - appelle onDone() quand c'est terminé
─────────────────────────────────────────────────────────────── */
function animateCaptures(mv, isAI, onDone){
  const myGen=gen;
  const path=mv.path;          // [[r0,c0],[r1,c1],...]
  const caps=mv.caps;          // [[er0,ec0],[er1,ec1],...]
  const n=caps.length;
  let step=0;

  // état intermédiaire du plateau pour l'animation
  // On repart du plateau courant (avant applyMove global)
  const animBoard=cloneB(board);
  // La pièce est déjà à path[0] sur animBoard

  function doStep(){
    if(gen!==myGen)return;
    if(step>=n){ onDone(); return; }

    const [pr,pc_]=path[step];
    const [nr,nc]=path[step+1];
    const [er,ec]=caps[step];

    // 1) Flash sur la pièce capturée
    // Rendre l'état courant avec flash sur la pièce adverse
    // (la pièce attaquante est à path[step])
    render([er,ec]);
    setStatus(`Capture ${step+1}/${n}…`);

    setTimeout(()=>{
      if(gen!==myGen)return;
      // 2) Effectuer ce saut sur animBoard
      const p=animBoard[pr][pc_];
      animBoard[nr][nc]=p;
      animBoard[pr][pc_]=EMPTY;
      animBoard[er][ec]=EMPTY;
      // Mettre à jour board pour render()
      board[nr][nc]=p;
      board[pr][pc_]=EMPTY;
      board[er][ec]=EMPTY;
      // Compteur de prises
      if(isAI) capsWhite++; else capsBlack++;
      flashScore(isAI?'white':'black');

      prevSnap=cloneB(board); // éviter animation is-new
      // on force prevSnap pour que la case d'arrivée ne déclenche pas is-new
      prevSnap[nr][nc]=p; // marquer comme déjà présente

      render();
      step++;
      setTimeout(doStep, 280);
    }, 340);
  }

  doStep();
}

/* ── clic joueur ──────────────────────────────────────────── */
function onClick(r,c){
  if(gameOver||turn!==BLACK||animating)return;
  const allMoves=genMoves(board,BLACK);
  if(selected){
    const mv=legalMoves.find(m=>m.to[0]===r&&m.to[1]===c);
    if(mv){doPlayerMove(mv);return;}
    if(owns(board[r][c],BLACK)){
      const myM=allMoves.filter(m=>m.from[0]===r&&m.from[1]===c);
      if(!myM.length){
        setStatus(allMoves.some(m=>m.caps.length>0)?'Ce pion ne peut pas capturer !':'Ce pion ne peut pas bouger.');
        return;
      }
      selected=[r,c];legalMoves=myM;render();return;
    }
    selected=null;legalMoves=null;render();return;
  }
  if(owns(board[r][c],BLACK)){
    const myM=allMoves.filter(m=>m.from[0]===r&&m.from[1]===c);
    if(!myM.length){setStatus(allMoves.some(m=>m.caps.length>0)?'Capture obligatoire ailleurs !':'');return;}
    selected=[r,c];legalMoves=myM;render();
  }
}

/* ── coup joueur ──────────────────────────────────────────── */
function doPlayerMove(mv){
  history.push({board:cloneB(board),turn:BLACK,cB:capsBlack,cW:capsWhite});
  selected=null;legalMoves=null;

  if(mv.caps.length>1){
    animating=true;
    render();
    animateCaptures(mv,false,()=>{
      // Finaliser : promotion éventuelle + changer de tour
      const [tr,tc]=mv.to,p=board[tr][tc];
      if(p===BLACK&&tr===0)board[tr][tc]=BK;
      animating=false;
      turn=WHITE;
      render();setActive();
      afterPlayerMove(mv);
    });
  } else {
    if(mv.caps.length===1){capsBlack++;flashScore('black');}
    applyMove(board,mv);
    turn=WHITE;render();setActive();
    afterPlayerMove(mv);
  }
}

function afterPlayerMove(mv){
  const myGen=gen;
  const next=genMoves(board,WHITE);
  if(!next.length){gameOver=true;setTimeout(()=>showWin('Noir'),400);return;}
  const c=mv.caps.length;
  setStatus(c?`Vous avez pris ${c} pièce${c>1?'s':''}. À l'ordinateur…`:"À l'ordinateur…");
  setTimeout(()=>{if(gen===myGen)doAIMove();},700);
}

/* ── tour IA ──────────────────────────────────────────────── */
function doAIMove(){
  if(gameOver||turn!==WHITE)return;
  document.getElementById('thinking').classList.add('show');
  setStatus('');
  const myGen=gen;
  const delay=aiLevel>=3?180:40;
  setTimeout(()=>{
    if(gen!==myGen)return;
    document.getElementById('thinking').classList.remove('show');
    const mv=getBestMove();
    if(!mv){gameOver=true;showWin('Noir');return;}

    if(mv.caps.length>1){
      animating=true;
      animateCaptures(mv,true,()=>{
        const [tr,tc]=mv.to,p=board[tr][tc];
        if(p===WHITE&&tr===ROWS-1)board[tr][tc]=WK;
        animating=false;
        turn=BLACK;render();setActive();
        afterAIMove(mv);
      });
    } else {
      if(mv.caps.length===1){capsWhite++;flashScore('white');}
      applyMove(board,mv);
      turn=BLACK;render();setActive();
      afterAIMove(mv);
    }
  },delay);
}

function afterAIMove(mv){
  const next=genMoves(board,BLACK);
  if(!next.length){gameOver=true;setTimeout(()=>showWin('Blanc'),400);return;}
  const c=mv.caps.length;
  setStatus(c?`L'IA prend ${c} pièce${c>1?'s':''}. À vous !`:'À vous de jouer');
}

/* ── victoire ──────────────────────────────────────────────── */
function showWin(winner){
  const isPlayer=winner==='Noir';
  document.getElementById('ov-title').textContent=isPlayer?'🏆 Victoire !':'💀 Défaite';
  document.getElementById('ov-sub').textContent=`Les ${winner.toLowerCase()}s ont gagné la partie`;
  document.getElementById('overlay').classList.add('show');
}

/* ── nouvelle partie ───────────────────────────────────────── */
function newGame(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('thinking').classList.remove('show');
  gen++;
  board=null;history=[];selected=null;legalMoves=null;
  turn=BLACK;gameOver=false;prevSnap=null;animating=false;
  capsBlack=0;capsWhite=0;
  initBoard();render();setActive();
  setStatus('À vous de jouer');
}

/* ── annuler ────────────────────────────────────────────────── */
document.getElementById('btn-undo').addEventListener('click',()=>{
  if(!history.length)return;
  gen++;
  animating=false;
  document.getElementById('thinking').classList.remove('show');
  const prev=history.pop();
  board=cloneB(prev.board);
  turn=prev.turn;
  capsBlack=prev.cB;capsWhite=prev.cW;
  selected=null;legalMoves=null;gameOver=false;prevSnap=null;
  render();setActive();
  setStatus('Tour annulé · À vous de jouer');
});

document.getElementById('btn-new').addEventListener('click',newGame);

document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    aiLevel=parseInt(btn.dataset.level);
    newGame();
  });
});

/* ── démarrage ────────────────────────────────────────────── */
aiLevel=1;gen=0;
newGame();
