<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équations — Produit nul & x² = a</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#eef2f7;
  --grid:#d5dce6;
  --card:#fff;
  --blue:#1d4ed8;
  --blue-l:#3b82f6;
  --blue-pale:rgba(59,130,246,.09);
  --blue-border:rgba(59,130,246,.22);
  --purple:#7c3aed;
  --purple-l:#a78bfa;
  --purple-pale:rgba(124,58,237,.1);
  --orange:#ea580c;
  --orange-pale:rgba(234,88,12,.10);
  --green:#16a34a;
  --green-pale:rgba(22,163,74,.09);
  --red:#dc2626;
  --red-pale:rgba(220,38,38,.09);
  --text:#1e293b;
  --text-l:#64748b;
  --border:#e2e8f0;
  --shadow:rgba(30,41,59,.09);
  --f1:#dc2626; --f2:#16a34a; --f3:#2563eb; --f4:#d97706;
}

body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:var(--bg);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:20px 20px;
  display:flex;justify-content:center;
  padding:14px 10px 60px;
  color:var(--text);
  -webkit-text-size-adjust:100%;
}

.app{max-width:900px;width:100%;}

/* HEADER */
.app-header{
  background:linear-gradient(135deg,#1d4ed8 0%,#7c3aed 100%);
  color:#fff;padding:16px 22px;
  border-radius:16px 16px 0 0;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(29,78,216,.28);
  position:relative;overflow:hidden;
}
.app-header::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 55%);pointer-events:none;}
.app-title{font-size:1.2em;font-weight:700;display:flex;align-items:center;gap:10px;position:relative;}
.app-title .icon-wrap{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;}
.back-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;border-radius:10px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88em;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.back-btn:hover{background:rgba(255,255,255,.3);transform:translateY(-1px);}

/* MAIN */
.main{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;padding:28px 24px;box-shadow:0 8px 28px var(--shadow);min-height:60vh;}

/* SCREEN */
.screen{display:none;animation:fadeIn .3s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* MENU */
.menu-intro{text-align:center;margin-bottom:28px;}
.menu-intro h1{font-size:1.55em;font-weight:700;color:var(--blue);margin-bottom:6px;}
.menu-intro p{color:var(--text-l);font-size:.95em;line-height:1.6;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:0 0 20px;}
.mc{background:#fff;border:2px solid var(--border);border-radius:16px;padding:28px 18px 22px;text-align:center;cursor:pointer;transition:all .25s;position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;}
.mc:hover{border-color:var(--blue-l);transform:translateY(-4px);box-shadow:0 8px 24px var(--shadow);}
.mc .mc-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7em;margin-bottom:4px;}
.mc-1 .mc-icon{background:linear-gradient(135deg,#fde68a,#f59e0b);}
.mc-2 .mc-icon{background:linear-gradient(135deg,#c7d2fe,#818cf8);}
.mc .mc-t{font-size:1.05em;font-weight:700;color:var(--blue);}
.mc .mc-math{font-family:'Crimson Pro',serif;font-size:1.2em;font-style:italic;color:var(--text-l);}
.mc-badge{position:absolute;top:12px;right:12px;background:var(--orange-pale);color:var(--orange);font-size:.72em;font-weight:700;padding:3px 10px;border-radius:12px;}

/* EX HEADER */
.ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.ex-badge{background:var(--blue-pale);color:var(--blue);padding:5px 14px;border-radius:20px;font-size:.84em;font-weight:700;}
.ex-score{font-size:.88em;color:var(--text-l);font-weight:600;}
.pbar{width:100%;background:var(--border);border-radius:6px;height:6px;overflow:hidden;margin-bottom:18px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:6px;transition:width .4s;}

/* ── MATH FONT ── */
.math{font-family:'Crimson Pro',serif;font-style:italic;}

/* EQUATION DISPLAY */
.eq-display{
  text-align:center;
  font-family:'Crimson Pro',serif;
  font-size:2em;font-style:italic;
  margin:18px 0 22px;line-height:1.5;
  user-select:none;
}
.eq-rhs{color:var(--text);}

/* FILL SENTENCE */
.fill-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin:0 0 20px;}
.fill-label{font-weight:700;font-size:1.05em;}
.fill-sep{font-size:1.1em;font-weight:700;color:var(--purple);padding:0 2px;}
.fill-inp{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:1.15em;font-weight:600;
  padding:8px 14px;border:2.5px dashed var(--blue-l);
  border-radius:10px;background:#fff;text-align:center;
  outline:none;width:140px;transition:all .2s;
}
.fill-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-pale);}
.fill-inp.ok{border-color:var(--green);background:var(--green-pale);color:var(--green);}
.fill-inp.err{border-color:var(--red);background:var(--red-pale);animation:shake .3s;}

/* ── ARROWS (reference style) ── */
.arrows-container{margin:10px auto;max-width:640px;}
.equation-step-item{margin-bottom:6px;}
.equation-line{
  font-family:'Crimson Pro',serif;
  font-size:1.5em;font-style:italic;
  text-align:center;line-height:1.6;margin:.4rem 0;
}
.circled{
  display:inline-block;border:2.5px solid var(--red);
  border-radius:50%;padding:.15em .5em;
  color:var(--red);font-weight:700;font-style:normal;
}

.arrow-section{position:relative;height:80px;margin:.6rem 0;}
.arrow-svg{position:absolute;width:100%;height:100%;}

/* wide operation inputs on sides */
.operation-input{
  position:absolute;transform:translateY(-50%);
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:1.05em;font-weight:700;
  padding:7px 14px;border:2px dashed var(--purple);
  border-radius:10px;background:#fff;text-align:center;
  outline:none;width:110px;transition:all .2s;
}
.operation-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-pale);}
.operation-input.ok{border-color:var(--green);background:var(--green-pale);color:var(--green);}
.operation-input.err{border-color:var(--red);background:var(--red-pale);animation:shake .3s;}
.left-op{left:16%;top:50%;}
.right-op{right:16%;top:50%;}

.step-input,.solution-input{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:1.35em;font-weight:700;
  width:220px;padding:9px 12px;text-align:center;
  border:2.5px dashed var(--purple);border-radius:12px;
  background:#fff;outline:none;transition:all .2s;display:inline-block;
}
.step-input:focus,.solution-input:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-pale);}
.step-input.ok,.solution-input.ok{border-color:var(--green);background:var(--green-pale);color:var(--green);}
.step-input.err,.solution-input.err{border-color:var(--red);background:var(--red-pale);animation:shakeNorm .3s;}

@keyframes shake{0%,100%{transform:translateY(-50%) translateX(0);}25%{transform:translateY(-50%) translateX(-8px);}75%{transform:translateY(-50%) translateX(8px);}}
@keyframes shakeNorm{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* ── PRODUIT NUL COLUMNS ── */
.pn-cols-wrap{margin:10px 0;}
.pn-cols{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.pn-col{
  flex:1;min-width:230px;max-width:340px;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:14px;padding:18px 16px 14px;
}
.pn-col-title{
  text-align:center;font-size:.82em;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  margin-bottom:12px;color:var(--text-l);
}
.pn-col .arrows-container{max-width:100%;margin:0;}
.pn-col .arrow-section{height:70px;}
.pn-col .operation-input{width:96px;font-size:.95em;}
.pn-col .left-op{left:8%;top:50%;}
.pn-col .right-op{right:8%;top:50%;}
.pn-col .equation-line{font-size:1.3em;}
.pn-col .step-input{width:180px;font-size:1.2em;}
.pn-col .solution-input{width:160px;font-size:1.2em;}

/* FEEDBACK */
.fb{margin-top:18px;padding:12px 16px;border-radius:12px;font-size:.93em;text-align:center;display:none;animation:fadeIn .3s;font-weight:600;line-height:1.6;}
.fb.ok{display:block;background:var(--green-pale);color:var(--green);border:2px solid rgba(22,163,74,.2);}
.fb.bad{display:block;background:var(--red-pale);color:var(--red);border:2px solid rgba(220,38,38,.15);}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;padding:11px 24px;border-radius:11px;font-size:.92em;font-weight:600;cursor:pointer;transition:all .2s;border:2px solid;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:none;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 12px rgba(29,78,216,.2);}
.btn-blue:hover:not(:disabled){background:var(--blue-l);transform:translateY(-2px);box-shadow:0 4px 16px rgba(29,78,216,.28);}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-green:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--text-l);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);border-color:var(--text-l);}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px;}

/* QCM */
.info-box{background:var(--blue-pale);border:1.5px solid var(--blue-border);border-radius:12px;padding:11px 16px;margin:14px 0;font-size:.92em;color:var(--blue);font-weight:600;text-align:center;}
.qcm-opts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.qcm-btn{font-family:'DM Sans',sans-serif;padding:12px 28px;border-radius:12px;font-size:1em;font-weight:700;cursor:pointer;transition:all .2s;border:2.5px solid var(--border);background:#fff;color:var(--text);min-width:100px;min-height:48px;}
.qcm-btn:hover{border-color:var(--blue-l);background:var(--blue-pale);color:var(--blue);}
.qcm-btn.selected{border-color:var(--blue);background:var(--blue);color:#fff;}
.qcm-btn.ok{border-color:var(--green);background:var(--green-pale);color:var(--green);pointer-events:none;}
.qcm-btn.wrong{border-color:var(--red);background:var(--red-pale);color:var(--red);pointer-events:none;}

/* SQRT inputs */
.sqrt-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:14px 0;align-items:center;}
.sqrt-box{display:flex;align-items:center;gap:8px;font-family:'Crimson Pro',serif;font-size:1.3em;font-style:italic;font-weight:600;}
.sqrt-inp{
  font-family:'Crimson Pro',serif;font-style:italic;font-size:1.1em;font-weight:700;
  width:160px;padding:8px 12px;text-align:center;
  border:2.5px dashed var(--purple);border-radius:10px;background:#fff;outline:none;transition:all .2s;
}
.sqrt-inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-pale);}
.sqrt-inp.ok{border-color:var(--green);background:var(--green-pale);color:var(--green);}
.sqrt-inp.err{border-color:var(--red);background:var(--red-pale);}

/* Keyboard */
.sqrt-keyboard{display:flex;gap:8px;justify-content:center;margin:4px 0;flex-wrap:wrap;}
.sqrt-key{padding:8px 18px;background:var(--purple-pale);color:var(--purple);border:2px solid rgba(124,58,237,.3);border-radius:10px;font-size:1.1em;font-weight:700;cursor:pointer;font-family:'Crimson Pro',serif;transition:all .2s;}
.sqrt-key:hover{background:var(--purple);color:#fff;}

/* CALCULATOR */
.calc-wrap{
  margin:14px auto 4px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:14px;padding:14px 16px;max-width:320px;
}
.calc-screen{
  font-family:'Crimson Pro',serif;font-size:1.5em;font-weight:600;
  text-align:right;background:#fff;border:1.5px solid var(--border);
  border-radius:10px;padding:8px 14px;min-height:48px;margin-bottom:10px;
  word-break:break-all;color:var(--text);
}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.calc-btn{
  font-family:'DM Sans',sans-serif;font-size:.95em;font-weight:700;
  padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;
  background:#fff;color:var(--text);cursor:pointer;transition:all .15s;min-height:42px;
}
.calc-btn:hover{background:var(--blue-pale);border-color:var(--blue-l);color:var(--blue);}
.calc-btn.op{background:var(--purple-pale);color:var(--purple);border-color:rgba(124,58,237,.3);}
.calc-btn.op:hover{background:var(--purple);color:#fff;}
.calc-btn.eq{background:var(--blue);color:#fff;border-color:var(--blue);}
.calc-btn.eq:hover{background:var(--blue-l);}
.calc-btn.clr{background:var(--red-pale);color:var(--red);border-color:rgba(220,38,38,.2);}
.calc-btn.clr:hover{background:var(--red);color:#fff;}
.calc-btn.sqrt-c{background:var(--orange-pale);color:var(--orange);border-color:rgba(234,88,12,.3);}
.calc-btn.sqrt-c:hover{background:var(--orange);color:#fff;}
.calc-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:.85em;font-weight:600;color:var(--text-l);
  margin:4px 0 2px;justify-content:center;
}
.calc-toggle input{cursor:pointer;width:16px;height:16px;}

/* RESULTS */
.rc{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto;border:6px solid;}
.rc.good{border-color:var(--green);background:var(--green-pale);}
.rc.mid{border-color:var(--orange);background:var(--orange-pale);}
.rc.bad{border-color:var(--red);background:var(--red-pale);}
.rc-pct{font-size:2em;font-weight:700;}
.rc-label{font-size:.8em;font-weight:600;color:var(--text-l);}
.r-msg{text-align:center;font-size:1.05em;font-weight:600;margin:12px 0 20px;}

/* SVG GLOBAL DEFS */
#global-defs{position:absolute;width:0;height:0;}

@media(max-width:600px){
  .main{padding:18px 12px;}
  .eq-display{font-size:1.5em;}
  .pn-col{min-width:100%;}
  .fill-inp{width:120px;}
  .operation-input{width:88px;}
  .sqrt-inp{width:130px;}
}
</style>
</head>
<body>

<!-- Global SVG defs for arrows -->
<svg id="global-defs" style="position:absolute;width:0;height:0;">
  <defs>
    <marker id="arr-purple" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#7c3aed"/>
    </marker>
    <marker id="arr-purple-r" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="10 0, 0 5, 10 10" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>

<div class="app">

<!-- HEADER -->
<div class="app-header">
  <div class="app-title">
    <div class="icon-wrap">🧮</div>
    Équations — Exerciseur interactif
  </div>
  <button class="back-btn" id="backBtn" onclick="goMenu()" style="display:none">← Menu</button>
</div>

<div class="main">

  <!-- MENU -->
  <div class="screen active" id="S_menu">
    <div class="menu-intro">
      <h1>Choisir un exercice</h1>
      <p>Sélectionne le type d'équation que tu veux travailler.</p>
    </div>
    <div class="menu-grid">
      <div class="mc mc-1" onclick="startPN()">
        <div class="mc-icon">✖️</div>
        <div class="mc-t">Produit nul</div>
        <div class="mc-math"><i>A</i> × <i>B</i> = 0</div>
        <div class="mc-badge">Méthode</div>
      </div>
      <div class="mc mc-2" onclick="startXC()">
        <div class="mc-icon">²</div>
        <div class="mc-t">Équation x² = a</div>
        <div class="mc-math"><i>x</i>² = <i>a</i></div>
        <div class="mc-badge">Méthode</div>
      </div>
    </div>
  </div>

  <!-- PRODUIT NUL -->
  <div class="screen" id="S_pn">
    <div class="ex-top">
      <div class="ex-badge">Produit nul</div>
      <div class="ex-score">Score : <span id="pn-sc">0</span> / <span id="pn-tot">0</span></div>
    </div>
    <div class="pbar"><div class="pfill" id="pn-bar" style="width:0%"></div></div>
    <div id="pn-zone"></div>
    <div class="fb" id="pn-fb"></div>
    <div class="controls">
      <button class="btn btn-green" id="pn-check" onclick="checkPN()">Vérifier ↵</button>
      <button class="btn btn-blue" id="pn-next" style="display:none" onclick="nextPN()">Question suivante →</button>
    </div>
  </div>

  <!-- X² = a -->
  <div class="screen" id="S_xc">
    <div class="ex-top">
      <div class="ex-badge"><i class="math">x</i>² = <i class="math">a</i></div>
      <div class="ex-score">Score : <span id="xc-sc">0</span> / <span id="xc-tot">0</span></div>
    </div>
    <div class="pbar"><div class="pfill" id="xc-bar" style="width:0%"></div></div>
    <div id="xc-zone"></div>
    <div class="fb" id="xc-fb"></div>
    <div class="controls" id="xc-ctrl" style="display:none">
      <button class="btn btn-blue" onclick="nextXC()">Question suivante →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="S_res">
    <div class="rc" id="r-circ">
      <div class="rc-pct" id="r-pct"></div>
      <div class="rc-label">Score</div>
    </div>
    <div class="r-msg" id="r-msg"></div>
    <div class="controls">
      <button class="btn btn-blue" onclick="goMenu()">← Retour au menu</button>
      <button class="btn btn-green" onclick="replay()">Rejouer</button>
    </div>
  </div>

</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
const $=id=>document.getElementById(id);
let _mode=null, _score=0, _idx=0, _qs=[], _cq=null;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}
function goMenu(){show('S_menu');$('backBtn').style.display='none';_mode=null;}
function replay(){_mode==='pn'?startPN():startXC();}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function isPerfectSquare(n){if(n<0)return false;const s=Math.round(Math.sqrt(n));return s*s===n;}
function formatFrac(num,den){if(den===1)return''+num;return num+'/'+den;}

// GCD
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);return b===0?a:gcd(b,a%b);}

// ═══════════════════════════════════════════════
//  FACTOR COLORS
// ═══════════════════════════════════════════════
const FCOLS=['#dc2626','#16a34a','#2563eb','#d97706'];

// ═══════════════════════════════════════════════
//  MATH RENDERING
// ═══════════════════════════════════════════════
function renderFactor(f){
  // f = {a, b, needsParen, isX}
  if(f.isX) return '<i>x</i>';
  const a=f.a, b=f.b;
  let s='';
  if(a===1) s='<i>x</i>';
  else if(a===-1) s='−<i>x</i>';
  else s=a+'<i>x</i>';
  if(b>0) s+=' + '+b;
  else if(b<0) s+=' − '+Math.abs(b);
  return f.needsParen ? '('+s+')' : s;
}

function renderEquation(factors){
  // returns colored HTML of the full equation = 0
  return factors.map((f,i)=>`<span style="color:${FCOLS[i%4]};font-weight:700">${renderFactor(f)}</span>`).join('')+' <span style="color:var(--text)">= 0</span>';
}

// Parse "ax+b=0" input → {a,b} or null
function parseFillInput(str){
  str=str.trim().replace(/\s+/g,'').toLowerCase()
         .replace(/−/g,'-').replace(/×/g,'*');
  if(!str.endsWith('=0')) return null;
  str=str.slice(0,-2);
  // Handle just "x" = "1x+0"
  if(str==='x') return {a:1,b:0};
  if(str==='-x') return {a:-1,b:0};
  // ax+b, ax-b
  let m=str.match(/^(-?\d+(?:\.\d+)?)?\*?x([+-]\d+(?:\.\d+)?)?$/);
  if(m){
    let a=m[1]===undefined||m[1]===''?1:parseFloat(m[1]);
    if(m[1]==='-') a=-1;
    let b=m[2]?parseFloat(m[2]):0;
    return{a,b};
  }
  // b+ax
  m=str.match(/^(-?\d+(?:\.\d+)?)([+-]\d+(?:\.\d+)?)?\*?x$/);
  if(m){
    let b=parseFloat(m[1]);
    let a=m[2]?parseFloat(m[2]):1;
    return{a,b};
  }
  return null;
}

// Check if two factors are proportional (represent same root)
function sameRoot(f1,f2){
  // root of f: -f.b/f.a  (or 0 for isX)
  const r1=f1.isX?0:(-f1.b/f1.a);
  const r2=f2.isX?0:(-f2.b/f2.a);
  return Math.abs(r1-r2)<1e-9;
}

function rootOfFactor(f){return f.isX?0:(-f.b/f.a);}

function buildPNCol(f,i){

        inner+=`
          <div class="equation-step-item">
            <div class="equation-line">
              <input type="text" class="step-input" id="step1-${i}" placeholder="Équation intermédiaire" 
                style="width:90%" autocomplete="off"
                onkeypress="if(event.key==='Enter')checkPN()">
            </div>
          </div>`;
      }
    }

    // Step 2: divide by a (if needed)
    if(needsDiv){
      inner+=`
        <div class="arrow-section">
          ${arrowSVG(c)}
          <input type="text" class="operation-input left-op" id="op2L-${i}" placeholder="?" 
            autocomplete="off" onkeypress="if(event.key==='Enter')checkPN()"
            style="border-color:${c}">
          <input type="text" class="operation-input right-op" id="op2R-${i}" placeholder="?" 
            autocomplete="off" onkeypress="if(event.key==='Enter')checkPN()"
            style="border-color:${c}">
        </div>`;
    } else if(f.b===0){
      // a=1 or a=-1, b=0 → ax=0 → just divide
      inner+=`
        <div class="arrow-section">
          ${arrowSVG(c)}
          <input type="text" class="operation-input left-op" id="op1L-${i}" placeholder="?" 
            autocomplete="off" onkeypress="if(event.key==='Enter')checkPN()"

// ── VERIFICATION PRODUIT NUL ──
function checkPN(){
  const q=pnCurrent;
  const n=q.factors.length;
  let allOk=true;

  // ─ Fill inputs: match to factors in any order
  const fillParsed=[];
  for(let i=0;i<n;i++){
    const inp=$(`fi-${i}`);
    fillParsed.push(inp?parseFillInput(inp.value):'');
  }
  const assignment=tryAssign(fillParsed,q.factors);
  if(assignment){
    for(let i=0;i<n;i++){
      const inp=$(`fi-${i}`);
      if(inp){inp.classList.add('ok');inp.disabled=true;}
    }
  } else {
    for(let i=0;i<n;i++){
      const inp=$(`fi-${i}`);
      if(inp){inp.classList.add('err');}
    }
    allOk=false;
  }

  // ─ Resolution columns
  for(let i=0;i<n;i++){
    const f=q.factors[i];
    const colOk=checkPNCol(f,i);
    if(!colOk) allOk=false;
  }

  const fb=$('pn-fb');
  if(allOk){
    pnScore++;
    $('pn-sc').textContent=pnScore;
    const sols=q.factors.map(f=>{
      const r=rootOfFactor(f);
      return `<i>x</i> = ${formatRoot(r)}`;
    });
    fb.className='fb ok';
    fb.innerHTML=`✅ Bravo ! Solutions : ${sols.join(' ou ')}`;
    $('pn-check').style.display='none';
    $('pn-next').style.display='';
  } else {
    fb.className='fb bad';
    fb.innerHTML='❌ Vérifie tes réponses et réessaie.';
  }
}

function checkPNCol(f,i){
  const sol=$(`sol-${i}`);
  const needsDiv=!f.isX && f.a!==1 && f.a!==-1;
  let ok=true;
  const root=rootOfFactor(f);

  if(f.isX){
    // sol should be 0
    const sv=(sol.value||'').trim().replace(/−/g,'-');
    const ok2=parseFloat(sv)===0;
    if(ok2){sol.classList.add('ok');sol.disabled=true;}
    else{sol.classList.add('err');ok=false;}
    return ok;
  }

  // Check op1 (subtract b or divide for b=0 case)
  const op1L=$(`op1L-${i}`);
  const op1R=$(`op1R-${i}`);

  if(f.b!==0){
    const absb=Math.abs(f.b);
    // expect -b on both sides (or +absb if b<0)
    const [opOk1L,opOk1R]=checkSubOp(op1L,op1R,f.b);
    if(!opOk1L) ok=false;
    if(!opOk1R) ok=false;

    if(needsDiv){
      // check step1 intermediate: ax = -b
      const step=$(`step1-${i}`);
      if(step){
        const sv=step.value.trim().replace(/\s/g,'').replace(/−/g,'-');
        const num=-f.b;
        const den=f.a;
        const expected1=makeExpected(f.a,num);
        if(expected1.some(e=>sv===e)){
          step.classList.add('ok');step.disabled=true;
        } else {
          step.classList.add('err');ok=false;
        }
      }
      // check op2 divide
      const op2L=$(`op2L-${i}`);
      const op2R=$(`op2R-${i}`);
      const [d2L,d2R]=checkDivOp(op2L,op2R,f.a);
      if(!d2L) ok=false;
      if(!d2R) ok=false;
    }
  } else {
    // b=0 → ax=0 → divide by a (if a≠1)
    if(f.a!==1 && f.a!==-1){
      const [d1L,d1R]=checkDivOp(op1L,op1R,f.a);
      if(!d1L) ok=false;
      if(!d1R) ok=false;
    } else {
      if(op1L){op1L.classList.add('ok');op1L.disabled=true;}
      if(op1R){op1R.classList.add('ok');op1R.disabled=true;}
    }
  }

  // Check solution — accept decimals, fractions (3/5), and negative fractions (-3/5)
  const solVal=parseSolVal(sol.value);
  if(!isNaN(solVal)&&Math.abs(solVal-root)<1e-6){
    sol.classList.add('ok');sol.disabled=true;
  } else {
    sol.classList.add('err');ok=false;
  }
  return ok;
}

function parseSolVal(str){
  if(!str) return NaN;
  str=str.trim().replace(/,/,'.').replace(/−/g,'-').replace(/\s+/g,'');
  // fraction: -3/5 or 3/5
  const m=str.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){const n=parseInt(m[1]),d=parseInt(m[2]);return d!==0?n/d:NaN;}
  return parseFloat(str);
}

function makeExpected(a,b){
  // produce acceptable strings for "ax = b"
  const aa=Math.abs(a);
  const results=[];
  if(a===1) results.push(`x=${b}`,`x= ${b}`);
  else if(a===-1) results.push(`-x=${b}`,`-x= ${b}`);
  else {
    const bStr=b<0?`${b}`:`${b}`;
    results.push(`${a}x=${bStr}`,`${a}x= ${bStr}`);
  }
  return results;
}

function checkSubOp(inpL,inpR,b){
  // operation should be -b (if b>0) or +|b| (if b<0)
  const ops=getSubOps(b);
  const okL=inpL?testOp(inpL.value,ops,inpL):false;
  const okR=inpR?testOp(inpR.value,ops,inpR):false;
  return[okL,okR];
}
function getSubOps(b){
  const neg=-b;
  if(neg>=0) return[`+${neg}`,`+ ${neg}`,''+neg];
  else return[`${neg}`,`− ${Math.abs(neg)}`,`-${Math.abs(neg)}`];
}
function checkDivOp(inpL,inpR,a){
  const aa=Math.abs(a);
  const ops=[`÷${aa}`,`/${aa}`,`:${aa}`];
  const okL=inpL?testOp(inpL.value,ops,inpL):false;
  const okR=inpR?testOp(inpR.value,ops,inpR):false;
  return[okL,okR];
}
function testOp(val,ops,inp){
  const v=val.trim().replace(/\s/g,'').replace(/−/g,'-');
  const found=ops.some(o=>v.includes(o.replace(/\s/g,'')));
  if(found){inp.classList.add('ok');inp.disabled=true;return true;}
  else{inp.classList.add('err');return false;}
}

// Try to assign parsed fill inputs to factors (any order)
function tryAssign(parsed,factors){
  const n=factors.length;
  const used=new Array(n).fill(false);
  return backtrack(parsed,factors,used,0);
}
function backtrack(parsed,factors,used,i){
  if(i===parsed.length) return true;
  if(!parsed[i]) return false;
  for(let j=0;j<factors.length;j++){
    if(!used[j]&&sameRoot(parsed[i],factors[j])){
      used[j]=true;
      if(backtrack(parsed,factors,used,i+1)) return true;
      used[j]=false;
    }
  }
  return false;
}

function formatRoot(r){
  if(Number.isInteger(r)) return''+r;
  // try to express as fraction with small denominator
  for(let d=2;d<=20;d++){
    const n=Math.round(r*d);
    if(Math.abs(n/d-r)<1e-9) return n+'/'+d;
  }
  return(Math.round(r*1000)/1000)+'';
}

        <div class="sqrt-box"><span style="font-family:'Crimson Pro',serif;font-style:italic">x</span> =
          <input type="text" class="sqrt-inp" id="s3" placeholder="?" autocomplete="off">
        </div>
      </div>
      <div class="controls" style="margin-top:10px" id="q2-verify-row">
        <button class="btn btn-green" id="q2-verify" onclick="checkXC_Q2_step1()">Vérifier ↵</button>
      </div>`;
  } else {
    // Non-perfect: single step, √52 accepted
    q2html=`
      <div class="sqrt-row">
        <div class="sqrt-box"><span style="font-family:'Crimson Pro',serif;font-style:italic">x</span> =
          <input type="text" class="sqrt-inp" id="s0" placeholder="?" autocomplete="off">
        </div>
        <div style="font-size:1.3em;font-weight:700;color:var(--text-l)">ou</div>
        <div class="sqrt-box"><span style="font-family:'Crimson Pro',serif;font-style:italic">x</span> =
          <input type="text" class="sqrt-inp" id="s1" placeholder="?" autocomplete="off">
        </div>
      </div>
      <div class="sqrt-keyboard">
        <button class="sqrt-key" onclick="insertSqrtFocused()">√</button>
        <button class="sqrt-key" onclick="insertMinusFocused()">−</button>
      </div>
      <div class="controls" style="margin-top:10px">
        <button class="btn btn-green" onclick="checkXC_Q2_simple()">Vérifier ↵</button>
      </div>`;
  }

  if(isSingle){
    q2html+=`
      <div class="sqrt-keyboard">
        <button class="sqrt-key" onclick="insertSqrtFocused()">√</button>
        <button class="sqrt-key" onclick="insertMinusFocused()">−</button>
      </div>
      <div class="controls" style="margin-top:10px"><button class="btn btn-green" onclick="checkXC_Q2_single()">Vérifier ↵</button></div>`;
  }

  $('xc-zone').innerHTML=`
    <div class="eq-display"><i style="font-family:'Crimson Pro',serif">x</i>² = ${aDisp}</div>
    <div class="info-box">❓ Question 2 — Quelles sont les solutions ?</div>
    ${q2html}
    ${buildCalc()}`;

  // enter key
  document.querySelectorAll('.sqrt-inp').forEach(inp=>{
    inp.addEventListener('keypress',e=>{
      if(e.key==='Enter'){
        const btn=document.querySelector('#q2-verify')||document.querySelector('#xc-zone .btn-green');
        if(btn) btn.click();
      }
    });
  });

  setTimeout(()=>{const f=$('s0');if(f)f.focus();},100);
}

// single solution (x²=0)
function checkXC_Q2_single(){
  const inp=$('s0');
  const v=parseSqrtVal(inp.value,$('xc-zone').querySelector('.eq-display').textContent);
  if(Math.abs(v-0)<1e-6){
    inp.classList.add('ok');inp.disabled=true;
    finishXC(true,'✅ Parfait ! <i>x</i> = 0');
  } else {
    inp.classList.add('err');
    finishXC(false,'❌ La solution est <i>x</i> = 0');
  }
}

// non-perfect square: accept √a directly
function checkXC_Q2_simple(){
  const q=xcCurrent;
  const s0=$('s0'), s1=$('s1');
  const v0=parseSqrtVal(s0.value);
  const v1=parseSqrtVal(s1.value);
  const expect=q.sqrtVal;
  const sqDisp=q.dispSqrt;
  const ok=(Math.abs(v0-expect)<1e-4 && Math.abs(v1+expect)<1e-4)
          ||(Math.abs(v0+expect)<1e-4 && Math.abs(v1-expect)<1e-4);
  if(ok){
    [s0,s1].forEach(s=>{s.classList.add('ok');s.disabled=true;});
    finishXC(true,`✅ Parfait ! <i>x</i> = ${sqDisp} ou <i>x</i> = −${sqDisp}`);
  } else {
    [s0,s1].forEach(s=>s.classList.add('err'));
    finishXC(false,`❌ Les solutions sont <i>x</i> = ${sqDisp} et <i>x</i> = −${sqDisp}`);
  }
}

// perfect square: smart — if user writes number → accept directly; if √n → ask to simplify
function checkXC_Q2_step1(){
  const q=xcCurrent;
  const s0=$('s0'), s1=$('s1');
  const v0str=(s0.value||'').trim();
  const v1str=(s1.value||'').trim();
  const v0=parseSqrtVal(v0str);
  const v1=parseSqrtVal(v1str);
  const expect=q.sqrtVal; // e.g. 7 for √49

  // Check if values are numerically correct (in any order)
  const numOk=(Math.abs(v0-expect)<1e-4 && Math.abs(v1+expect)<1e-4)
            ||(Math.abs(v0+expect)<1e-4 && Math.abs(v1-expect)<1e-4);

  if(!numOk){
    [s0,s1].forEach(s=>s.classList.add('err'));
    $('xc-fb').className='fb bad';
    $('xc-fb').innerHTML=`❌ Pas correct. Les solutions sont ±√${q.a} = ±${expect}`;
    return;
  }

  // Check if user wrote √ form (needs simplification step) or direct number
  const hasSqrt=v0str.includes('√')||v1str.includes('√');

  if(hasSqrt){
    // Correct √ form → ask to simplify
    s0.classList.add('ok');s0.disabled=true;
    s1.classList.add('ok');s1.disabled=true;
    $('xc-fb').className='fb ok';
    $('xc-fb').innerHTML=`✅ Bien écrit ! Maintenant simplifie : combien vaut √${q.a} ?`;
    $('step2-box').style.display='';
    $('step2-row').style.display='';
    $('q2-verify').textContent='Vérifier la simplification ↵';
    $('q2-verify').onclick=checkXC_Q2_step2;
    setTimeout(()=>{const f=$('s2');if(f)f.focus();},100);
  } else {
    // Direct number form → accept immediately
    s0.classList.add('ok');s0.disabled=true;
    s1.classList.add('ok');s1.disabled=true;
    finishXC(true,`✅ Parfait ! <i>x</i> = ${expect} ou <i>x</i> = −${expect}`);
  }
}

function checkXC_Q2_step2(){
  const q=xcCurrent;
  const s2=$('s2'), s3=$('s3');
  const expect=q.sqrtVal;
  const v2=parseFloat((s2.value||'').trim().replace(/,/,'.').replace(/−/g,'-'));
  const v3=parseFloat((s3.value||'').trim().replace(/,/,'.').replace(/−/g,'-'));
  const ok=(Math.abs(v2-expect)<1e-6 && Math.abs(v3+expect)<1e-6)
          ||(Math.abs(v2+expect)<1e-6 && Math.abs(v3-expect)<1e-6);
  if(ok){
    [s2,s3].forEach(s=>{s.classList.add('ok');s.disabled=true;});
    finishXC(true,`✅ Parfait ! <i>x</i> = ${expect} ou <i>x</i> = −${expect}`);
  } else {
    [s2,s3].forEach(s=>s.classList.add('err'));
    $('xc-fb').className='fb bad';
    $('xc-fb').innerHTML=`❌ √${q.a} = ${expect}. Donc <i>x</i> = ${expect} ou <i>x</i> = −${expect}`;
  }
}

function parseSqrtVal(str){
  if(!str) return NaN;
  str=str.trim().replace(/\s+/g,'').replace(/−/g,'-').replace(/,/,'.');
  const n=parseFloat(str);
  if(!isNaN(n)) return n;
  let m=str.match(/^(-?)√(\d+(?:\.\d+)?)$/);
  if(m) return (m[1]==='-'?-1:1)*Math.sqrt(parseFloat(m[2]));
  return NaN;
}

// Track last focused sqrt-inp to avoid losing it when clicking buttons
let _lastSqrtInp=null;
document.addEventListener('focusin',e=>{
  if(e.target&&e.target.classList&&e.target.classList.contains('sqrt-inp')){
    _lastSqrtInp=e.target;
  }
});
function insertSqrtFocused(){ insertIntoFocused('√'); }
function insertMinusFocused(){ insertIntoFocused('−'); }
function insertIntoFocused(char){
  // clicking a button steals focus — use last known sqrt-inp
  let target=_lastSqrtInp;
  if(!target||target.disabled||!document.contains(target)){
    const all=document.querySelectorAll('.sqrt-inp:not([disabled])');
    target=all[0]||null;
  }
  if(!target) return;
  const pos=(target.selectionStart!=null)?target.selectionStart:target.value.length;
  target.value=target.value.slice(0,pos)+char+target.value.slice(pos);
  target.selectionStart=target.selectionEnd=pos+1;
  target.focus();
  _lastSqrtInp=target;
}

function finishXC(ok,msg){
  if(ok){xcScore++;$('xc-sc').textContent=xcScore;}
  $('xc-fb').className=ok?'fb ok':'fb bad';
  $('xc-fb').innerHTML=msg;
  $('xc-ctrl').style.display='';
  // disable verify buttons
  document.querySelectorAll('#xc-zone .btn-green').forEach(b=>b.style.display='none');
}

function nextXC(){
  xcIdx++;$('xc-tot').textContent=xcIdx;
  if(xcIdx>=xcQs.length) showResults('xc',xcScore,xcQs.length);
  else loadXC();
}

// ═══════════════════════════════════════════════
//  CALCULATOR
// ═══════════════════════════════════════════════
function buildCalc(){
  return `
    <label class="calc-toggle">
      <input type="checkbox" id="calc-tog" onchange="toggleCalc(this)"> Afficher la calculatrice
    </label>
    <div id="calc-panel" style="display:none">
      <div class="calc-wrap">
        <div class="calc-screen" id="calc-screen">0</div>
        <div class="calc-grid">
          <button class="calc-btn clr" onclick="calcAC()">AC</button>
          <button class="calc-btn clr" onclick="calcDel()">⌫</button>
          <button class="calc-btn op" onclick="calcPush('%')">%</button>
          <button class="calc-btn op" onclick="calcPush('÷')">÷</button>
          
          <button class="calc-btn" onclick="calcPush('7')">7</button>
          <button class="calc-btn" onclick="calcPush('8')">8</button>
          <button class="calc-btn" onclick="calcPush('9')">9</button>
          <button class="calc-btn op" onclick="calcPush('×')">×</button>
          
          <button class="calc-btn" onclick="calcPush('4')">4</button>
          <button class="calc-btn" onclick="calcPush('5')">5</button>
          <button class="calc-btn" onclick="calcPush('6')">6</button>
          <button class="calc-btn op" onclick="calcPush('−')">−</button>
          
          <button class="calc-btn" onclick="calcPush('1')">1</button>
          <button class="calc-btn" onclick="calcPush('2')">2</button>
          <button class="calc-btn" onclick="calcPush('3')">3</button>
          <button class="calc-btn op" onclick="calcPush('+')">+</button>
          
          <button class="calc-btn sqrt-c" onclick="calcSqrt()">√</button>
          <button class="calc-btn" onclick="calcPush('0')">0</button>
          <button class="calc-btn" onclick="calcPush('.')">.</button>
          <button class="calc-btn eq" onclick="calcEval()">=</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:4px">
        <button class="sqrt-key" onclick="useCalcResult()" id="use-calc-btn" style="display:none;font-size:.85em">
          → Utiliser ce résultat dans la case active
        </button>
      </div>
    </div>`;
}

function toggleCalc(cb){
  $('calc-panel').style.display=cb.checked?'':'none';
}
function calcPush(v){
  if(calcExpr==='0'||calcExpr==='') calcExpr=v;
  else calcExpr+=v;
  updateCalcScreen();
}
function calcAC(){calcExpr='';calcLastResult=null;updateCalcScreen();}
function calcDel(){calcExpr=calcExpr.slice(0,-1);updateCalcScreen();}
function updateCalcScreen(){
  const sc=$('calc-screen');
  if(sc) sc.textContent=calcExpr||'0';
}
function calcSqrt(){
  try{
    const val=evalCalcExpr(calcExpr);
    const r=Math.sqrt(val);
    calcLastResult=r;
    calcExpr='√'+val+'='+formatNum(r);
    updateCalcScreen();
    showUseBtn();
  } catch(e){calcExpr='Erreur';updateCalcScreen();}
}
function calcEval(){
  try{
    const r=evalCalcExpr(calcExpr);
    calcLastResult=r;
    calcExpr=''+formatNum(r);
    updateCalcScreen();
    showUseBtn();
  } catch(e){calcExpr='Erreur';updateCalcScreen();}
}
function evalCalcExpr(expr){
  const s=expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
  return Function('"use strict";return ('+s+')')();
}
function formatNum(n){
  if(!isFinite(n)) return''+n;
  const r=Math.round(n*1e9)/1e9;
  return Number.isInteger(r)?''+r:''+r;
}
function showUseBtn(){
  const btn=$('use-calc-btn');
  if(btn) btn.style.display='';
}
function useCalcResult(){
  if(calcLastResult===null) return;
  // Insert into the currently focused sqrt-inp
  const active=document.activeElement;
  if(active&&active.classList.contains('sqrt-inp')){
    active.value=formatNum(calcLastResult);
  } else {
    // find first empty sqrt-inp
    const inputs=document.querySelectorAll('.sqrt-inp:not([disabled])');
    for(const inp of inputs){
      if(!inp.value){inp.value=formatNum(calcLastResult);inp.focus();break;}
    }
  }
}

function showResults(mode,score,total){
  const pct=total>0?Math.round(score/total*100):0;
  const tier=pct>=80?'good':pct>=50?'mid':'bad';
  $('r-circ').className='rc '+tier;
  $('r-pct').textContent=pct+'%';
  $('r-pct').style.color=tier==='good'?'var(--green)':tier==='mid'?'var(--orange)':'var(--red)';
  $('r-msg').textContent=pct===100?'🎉 Parfait ! Maîtrise totale !':
    pct>=80?'👏 Très bien ! Continue comme ça !':
    pct>=60?'👍 Bon travail, tu progresses !':
    '💪 Continue à t\'entraîner, tu y arriveras !';
  show('S_res');
  $('backBtn').style.display='';
}
